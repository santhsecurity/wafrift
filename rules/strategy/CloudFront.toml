# CloudFront default strategy
# CloudFront is a CDN with basic WAF; standard encoding usually suffices.

waf = "CloudFront"

[[pipeline]]
name = "cloudfront-light"
cost = 2
techniques = [
    "user-agent-rotation",
    "encoding:CaseAlternation",
    "header:CaseMixing",
]

[[pipeline]]
name = "cloudfront-medium"
cost = 4
techniques = [
    "user-agent-rotation",
    "grammar:sql_tautology",
    "encoding:UrlEncode",
    "content-type:JsonUnicodeEscape",
    "header:CaseMixing",
]

[[pipeline]]
name = "cloudfront-heavy"
cost = 7
techniques = [
    "user-agent-rotation",
    "grammar:sql_tautology",
    "encoding:DoubleUrlEncode",
    "content-type:Multipart",
    "header:DuplicateHopByHop",
    "smuggling:TE.CL",
    "h2:MixedCaseHeaders",
]
