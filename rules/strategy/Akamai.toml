# Akamai default strategy
# Akamai uses behavioral scoring; slow request timing and header tricks work.

waf = "Akamai"

[[pipeline]]
name = "akamai-light"
cost = 2
techniques = [
    "user-agent-rotation",
    "encoding:CaseAlternation",
    "header:CaseMixing",
]

[[pipeline]]
name = "akamai-medium"
cost = 4
techniques = [
    "user-agent-rotation",
    "grammar:comment_obfuscation",
    "encoding:UrlEncode",
    "content-type:Multipart",
    "header:DuplicateHopByHop",
]

[[pipeline]]
name = "akamai-heavy"
cost = 7
techniques = [
    "user-agent-rotation",
    "grammar:comment_obfuscation",
    "encoding:DoubleUrlEncode",
    "content-type:XmlCdata",
    "header:TEAmbiguity",
    "smuggling:TE.CL",
    "h2:MixedCaseHeaders",
]
