# Imperva Incapsula default strategy
# Imperva tracks sessions; TLS fingerprint rotation and encoding layering help.

waf = "Imperva"

[[pipeline]]
name = "imperva-light"
cost = 2
techniques = [
    "user-agent-rotation",
    "encoding:CaseAlternation",
    "header:CaseMixing",
]

[[pipeline]]
name = "imperva-medium"
cost = 4
techniques = [
    "tls:chrome",
    "grammar:null_byte",
    "encoding:HexEncode",
    "content-type:Multipart",
    "header:CaseMixing",
]

[[pipeline]]
name = "imperva-heavy"
cost = 7
techniques = [
    "tls:chrome",
    "grammar:null_byte",
    "encoding:HexEncode",
    "content-type:JsonUnicodeEscape",
    "header:ObsFold",
    "smuggling:TE.TE",
    "h2:MixedCaseHeaders",
]
