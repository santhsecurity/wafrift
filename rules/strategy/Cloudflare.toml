# Cloudflare WAF default strategy
# Cloudflare is sensitive to case alternation and JSON unicode escapes.

waf = "Cloudflare"

[[pipeline]]
name = "cloudflare-light"
cost = 2
techniques = [
    "user-agent-rotation",
    "encoding:CaseAlternation",
    "header:CaseMixing",
]

[[pipeline]]
name = "cloudflare-medium"
cost = 4
techniques = [
    "user-agent-rotation",
    "grammar:sql_tautology",
    "encoding:DoubleUrlEncode",
    "content-type:JsonUnicodeEscape",
    "header:CaseMixing",
]

[[pipeline]]
name = "cloudflare-heavy"
cost = 7
techniques = [
    "user-agent-rotation",
    "grammar:sql_tautology",
    "encoding:DoubleUrlEncode",
    "content-type:Multipart",
    "header:CaseMixing",
    "smuggling:CL.TE",
    "h2:MixedCaseHeaders",
]
