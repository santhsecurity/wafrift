# Barracuda default strategy
# Barracuda WAF is protocol-anomaly aware; smuggling and H2 tricks are high-value.

waf = "Barracuda"

[[pipeline]]
name = "barracuda-light"
cost = 2
techniques = [
    "user-agent-rotation",
    "encoding:CaseAlternation",
    "header:CaseMixing",
]

[[pipeline]]
name = "barracuda-medium"
cost = 4
techniques = [
    "user-agent-rotation",
    "grammar:comment_obfuscation",
    "encoding:UrlEncode",
    "content-type:XmlCdata",
    "header:CaseMixing",
]

[[pipeline]]
name = "barracuda-heavy"
cost = 7
techniques = [
    "user-agent-rotation",
    "grammar:comment_obfuscation",
    "encoding:DoubleUrlEncode",
    "content-type:MultipartQuotedBoundary",
    "header:TEAmbiguity",
    "smuggling:TE.TE",
    "h2:MixedCaseHeaders",
]
