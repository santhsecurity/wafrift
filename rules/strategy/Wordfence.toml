# Wordfence default strategy
# Wordfence is PHP/WordPress focused; comment evasion and null bytes help.

waf = "Wordfence"

[[pipeline]]
name = "wordfence-light"
cost = 2
techniques = [
    "user-agent-rotation",
    "encoding:UrlEncode",
    "header:CaseMixing",
]

[[pipeline]]
name = "wordfence-medium"
cost = 4
techniques = [
    "user-agent-rotation",
    "grammar:comment_obfuscation",
    "encoding:CaseAlternation",
    "content-type:Multipart",
    "header:CaseMixing",
]

[[pipeline]]
name = "wordfence-heavy"
cost = 7
techniques = [
    "user-agent-rotation",
    "grammar:null_byte",
    "encoding:DoubleUrlEncode",
    "content-type:MultipartQuotedBoundary",
    "header:TEAmbiguity",
    "smuggling:CL.TE",
    "h2:MixedCaseHeaders",
]
