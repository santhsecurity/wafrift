[[waf]]
name = "Cloudfront"
vendor = "Amazon"
confidence_threshold = 0.3
evasions = ["CaseAlternation", "SqlCommentInsertion", "DoubleUrlEncode", "ContentTypeSwitch"]
source = "WAFW00F:cloudfront + wafrift:edge-headers"

# Classic Server-banner / block-page markers (wafw00f).
[[waf.signature]]
  header_name = "server"
  header_regex = "cloudfront"
  weight = 0.5
[[waf.signature]]
  body_regex = "generated by cloudfront \\(cloudfront\\)"
  weight = 0.5

# Real-world edge markers. CloudFront in front of an origin almost never
# rewrites the `Server` banner (the origin's `Server: nginx` passes
# through); the distribution announces itself via the proxy/cache and
# `x-amz-cf-*` headers instead. The previous rule missed every one of
# these, so a CloudFront-fronted host (e.g. discourse.org:
#   via: 1.1 <hash>.cloudfront.net (CloudFront)
#   x-cache: Hit from cloudfront
#   x-amz-cf-pop: IAD89-P3
#   x-amz-cf-id: <opaque>
# ) reported "No WAF confidently detected".
[[waf.signature]]
  header_name = "via"
  header_regex = "(?i)cloudfront"
  weight = 0.6
[[waf.signature]]
  header_name = "x-cache"
  header_regex = "(?i)cloudfront"
  weight = 0.5
# Presence of the Amazon CloudFront PoP / request-id headers is, on its
# own, conclusive — the value is opaque so we match "any non-empty".
[[waf.signature]]
  header_name = "x-amz-cf-pop"
  header_regex = "."
  weight = 0.6
[[waf.signature]]
  header_name = "x-amz-cf-id"
  header_regex = "."
  weight = 0.6
