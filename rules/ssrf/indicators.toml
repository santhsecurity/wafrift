# SSRF (Server-Side Request Forgery) Indicator Rules
# Patterns that indicate SSRF attack attempts

# Loopback/sensitive IP patterns that indicate SSRF intent
[[indicator_host]]
host = "127.0.0.1"
description = "IPv4 loopback address"

[[indicator_host]]
host = "localhost"
description = "Localhost hostname"

[[indicator_host]]
host = "0.0.0.0"
description = "All interfaces (IPv4)"

[[indicator_host]]
host = "::1"
description = "IPv6 loopback address"

[[indicator_host]]
host = "0000::1"
description = "Compressed IPv6 loopback"

[[indicator_host]]
host = "0:0:0:0:0:0:0:1"
description = "Full IPv6 loopback"

[[indicator_host]]
host = "2130706433"
description = "127.0.0.1 as 32-bit integer"

[[indicator_host]]
host = "0177.0.0.1"
description = "Octal-encoded loopback"

[[indicator_host]]
host = "0x7f000001"
description = "Hex-encoded loopback"

[[indicator_host]]
host = "169.254.169.254"
description = "AWS EC2 metadata service"

[[indicator_host]]
host = "metadata.google.internal"
description = "GCP metadata hostname"

[[indicator_host]]
host = "100.100.100.200"
description = "Alibaba Cloud metadata"

[[indicator_host]]
host = "192.0.0.1"
description = "Oracle Cloud metadata"

[[indicator_host]]
host = "0"
description = "Shorthand for 0.0.0.0"

