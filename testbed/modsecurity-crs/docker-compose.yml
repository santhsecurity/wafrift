# OWASP ModSecurity with Core Rule Set (CRS). Optional local WAF for manual runs.
# Image tags change — if pull fails, pick a current tag from:
# https://hub.docker.com/r/owasp/modsecurity-crs
#
#   cd testbed/modsecurity-crs && docker compose up -d
#   export WAFRIFT_MODSEC_URL=http://127.0.0.1:18080
#   cargo test -p wafrift-cli --test modsec_local -- --ignored

services:
  modsec:
    image: owasp/modsecurity-crs:nginx-alpine
    ports:
      - "18080:8080"
