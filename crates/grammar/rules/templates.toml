# Polyglot payloads that trigger multiple engines
[[polyglot]]
name = "polyglot_probe"
description = "Payload designed to trigger multiple template engines"
payload = "${{<%[%'\"}}%\\."

[[polyglot]]
name = "jinja_twig"
description = "Works in both Jinja2 and Twig"
payload = "{{7*7}}"

[[polyglot]]
name = "java_universal"
description = "Works in multiple Java engines"
payload = "${7*7}"

[[polyglot]]
name = "erb_style"
description = "Works in ERB and similar"
payload = "<%= 7*7 %>"

[[polyglot]]
name = "velocity_style"
description = "Works in Velocity and similar"
payload = "#{7*7}"

[[polyglot]]
name = "universal_interpolation"
description = "Common interpolation pattern"
payload = "${7*7}"
