# XSS payload corpus for the wafrift-grammar mutator.
#
# Each list is a starting set the engine cycles through when expanding
# an XSS seed payload into variants. Append to the relevant array to
# teach the mutator a new shape — the engine handles list size growth
# without code changes.

# ── Alternative ways to execute JavaScript ──
[[exec_function]]
template = "alert(1)"
[[exec_function]]
template = "alert`1`"           # Tagged template literal
[[exec_function]]
template = "confirm(1)"
[[exec_function]]
template = "confirm`1`"
[[exec_function]]
