[[waf]]
name = "Wordfence"
vendor = "Defiant"
confidence_threshold = 0.3
evasions = ["CaseAlternation", "WhitespaceInsertion", "DoubleUrlEncode", "ContentTypeSwitch"]
source = "WAFW00F:wordfence"
[[waf.signature]]
  header_name = "server"
  header_regex = "wf[_\\-]?WAF"
  weight = 0.5
[[waf.signature]]
  body_regex = "Generated by Wordfence"
  weight = 0.4
[[waf.signature]]
  body_regex = "broke one of (the )?Wordfence (advanced )?blocking rules"
  weight = 0.4
[[waf.signature]]
  body_regex = "/plugins/wordfence"
  weight = 0.4
[[waf.signature]]
  body_regex = "wordfence"
  weight = 0.5
[[waf.signature]]
  body_regex = "this response was generated by wordfence"
  weight = 0.5
[[waf.signature]]
  cookie_regex = "wfvt_"
  weight = 0.5
[[waf.signature]]
  body_regex = "your access to this site has been limited"
  weight = 0.3
