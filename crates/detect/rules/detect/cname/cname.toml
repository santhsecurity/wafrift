source = "cymru ASN 8075 MICROSOFT-CORP-MSN-AS-BLOCK"
[[cname.signature]]
  host_regex = "^MICROSOFT-"
  weight = 0.8

[[cname]]
name = "Dropbox (ASN)"
vendor = "Dropbox"
confidence_threshold = 0.5
source = "cymru ASN 19679 — `DROPBOX - Dropbox, Inc., US`"
[[cname.signature]]
  # Cymru sometimes returns the full org name (`DROPBOX -
  # Dropbox, Inc., US`), other times the short tag.  Match the
  # `DROPBOX` prefix followed by whitespace or comma.
  host_regex = "^DROPBOX[\\s,]"
  weight = 0.8

