# CNAME-chain detection rules.
#
# Every signature matches against ANY hop in the CNAME chain (the
# original query name, intermediate aliases, and the final target).
# Detection composes with header-based detection: when both layers
# agree, confidence converges to 1.0; when they disagree (e.g. CNAME
# says Akamai but Server: header says nginx) the operator can see
# the divergence in the indicators list.
#
# Source legend:
#   * "live-dns 2026-05-21" — first-hand resolver capture
#   * vendor docs / SOA registrar — public reference
#
# Adding a new vendor: register one [[cname]] block per vendor.
# Each [[cname.signature]] gets a host-pattern regex (matched
# case-insensitively, auto-anchored to no specific position) and a
# weight in [0, 1].  Sum across signatures must exceed
# `confidence_threshold` to fire.

[[cname]]
name = "Fastly (CNAME)"
vendor = "Fastly"
confidence_threshold = 0.5
evasions = ["CaseAlternation", "SqlCommentInsertion", "DoubleUrlEncode", "ContentTypeSwitch"]
source = "live-dns 2026-05-21 — reddit.map.fastly.net, nytimes.map.fastly.net"
[[cname.signature]]
  # Customer-routing alias (most common Fastly pattern).
  host_regex = "\\.map\\.fastly\\.net$"
  weight = 0.7
[[cname.signature]]
  # Anycast-pool root.  Lower weight because some non-Fastly
  # tenants of the same network occasionally surface here.
  host_regex = "\\.fastly\\.net$"
  weight = 0.4
[[cname.signature]]
  # Fastly's secondary edge domain — used for cert-coordinated
  # services and apex-flattening setups.
  host_regex = "\\.fastlylb\\.net$"
  weight = 0.5

[[cname]]
name = "Akamai (CNAME)"
vendor = "Akamai"
confidence_threshold = 0.5
evasions = ["CaseAlternation", "SqlCommentInsertion", "DoubleUrlEncode", "ContentTypeSwitch"]
