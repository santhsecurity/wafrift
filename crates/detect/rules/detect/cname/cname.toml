  host_regex = "\\.akamaiedge\\.net$"
  weight = 0.7
[[cname.signature]]
  # Legacy delivery aliases.
  host_regex = "\\.akamai\\.net$"
  weight = 0.6
[[cname.signature]]
  host_regex = "\\.akamaihd\\.net$"
  weight = 0.5
[[cname.signature]]
  # NetStorage object-store endpoints.
  host_regex = "\\.akamaitechnologies\\.com$"
  weight = 0.5
[[cname.signature]]
  # Edge-Suite (legacy CDN) — still in production at Microsoft,
  # Dropbox, and historical Akamai tenants.
  host_regex = "\\.edgesuite\\.net$"
  weight = 0.6
[[cname.signature]]
  # Edgekey (secure-content variant of EdgeSuite).
  host_regex = "\\.edgekey\\.net$"
  weight = 0.6
[[cname.signature]]
  # mPulse RUM endpoints — implies Akamai is in the path even
  # when the leaf hop is a customer-branded alias.
  host_regex = "\\.akadns\\.net$"
  weight = 0.5

