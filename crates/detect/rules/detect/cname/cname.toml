confidence_threshold = 0.5
source = "GCP PTR allocation"
[[cname.signature]]
  host_regex = "\\.bc\\.googleusercontent\\.com$"
  weight = 0.7

# GitHub runs its own anycast LBs.  PTR exposes them via
# `lb-X-X-X-X-<region>.github.com` (live capture, 2026-05-21).
# Identifying GitHub explicitly is useful because GH's edge applies
# its own DDoS / abuse rules even though no public CDN sits in front.
[[cname]]
name = "WordPress VIP"
vendor = "Automattic"
confidence_threshold = 0.5
source = "live-dns 2026-05-21 — harvard.edu → harvard-edu.go-vip.net"
[[cname.signature]]
  host_regex = "\\.go-vip\\.net$"
  weight = 0.8
[[cname.signature]]
  host_regex = "\\.wpvip\\.com$"
  weight = 0.7
[[cname.signature]]
  host_regex = "\\.vip\\.wordpress\\.com$"
  weight = 0.6

[[cname]]
name = "GitHub Edge"
vendor = "GitHub"
confidence_threshold = 0.5
source = "live-dns 2026-05-21 — github.com PTR → lb-*.github.com"
[[cname.signature]]
  host_regex = "^lb-[0-9-]+-[a-z]+\\.github\\.com$"
  weight = 0.8
[[cname.signature]]
  host_regex = "\\.githubusercontent\\.com$"
  weight = 0.6

