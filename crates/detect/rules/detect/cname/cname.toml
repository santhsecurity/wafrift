[[cname]]
name = "Cloudflare (PTR)"
vendor = "Cloudflare"
confidence_threshold = 0.5
source = "Cloudflare PoP allocation"
[[cname.signature]]
  # `*.cloudflare.com` PTRs are the typical PoP name (`lhr08.r.cloudflare.com`,
  # numeric variants). The trailing dot pattern catches the canonical
  # multi-label PTR form without false-positive on cloudflare.com itself.
  host_regex = "\\.r\\.cloudflare\\.com$"
  weight = 0.8

[[cname]]
name = "AWS EC2 / NLB"
vendor = "Amazon"
confidence_threshold = 0.5
source = "AWS PTR allocation"
[[cname.signature]]
  # Modern region-named form: `ec2-X-X-X-X.us-west-2.compute.amazonaws.com`
  # (Slack, Netflix-internal services, many AWS-fronted apps).
  host_regex = "\\.compute\\.amazonaws\\.com$"
  weight = 0.7
[[cname.signature]]
  # Legacy numbered form: `ec2-X-X-X-X.compute-1.amazonaws.com`.
  host_regex = "\\.compute-[0-9]+\\.amazonaws\\.com$"
  weight = 0.7
[[cname.signature]]
  # PTR leaf prefix — `ec2-N-N-N-N.` — additive when the regional
  # part matches one of the patterns above.
  host_regex = "^ec2-[0-9-]+\\."
  weight = 0.3

