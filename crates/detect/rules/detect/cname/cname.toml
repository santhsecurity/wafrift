# ── PTR (reverse-DNS) signatures ─────────────────────────────────
#
# These fire when the forward CNAME chain is opaque (origin-direct
# or customer-private DNS) but the leaf IP's reverse-DNS name
# carries vendor identity.  PTR works for origins that strip every
# HTTP banner — Stripe being the canonical example.

[[cname]]
name = "Stripe (origin-direct)"
vendor = "Stripe"
confidence_threshold = 0.5
source = "live-dns 2026-05-21 — 198.137.150.111 PTR → *.s.stripe.com; ASN 395812 STRIPE-AS"
[[cname.signature]]
  host_regex = "\\.s\\.stripe\\.com$"
  weight = 0.8
[[cname.signature]]
  # cymru.com ASN name lookup returns this string verbatim for any
  # IP allocated to Stripe's ASN (395812).  This is the catch for
  # Stripe's main IPs which strip PTR — `cymru` is the layer below.
  host_regex = "^STRIPE-AS"
  weight = 0.8

# ── BGP / ASN catch-all rules ────────────────────────────────────
#
# Cymru's `origin.asn.cymru.com` TXT lookup returns the ASN
# organisation name registered with the RIR.  These rules fire on
# the AS name string when every other signal is stripped.

[[cname]]
name = "Amazon (ASN)"
vendor = "Amazon"
confidence_threshold = 0.5
source = "cymru ASN — Amazon's main ASNs (16509, 14618, etc.)"
[[cname.signature]]
  host_regex = "^AMAZON-"
  weight = 0.8
[[cname.signature]]
  host_regex = "^AMAZON,"
  weight = 0.8

[[cname]]
name = "Cloudflare (ASN)"
vendor = "Cloudflare"
confidence_threshold = 0.5
source = "cymru ASN 13335 CLOUDFLARENET"
[[cname.signature]]
  host_regex = "^CLOUDFLARENET"
  weight = 0.8

[[cname]]
name = "Fastly (ASN)"
