# Community-editable stack fingerprint rules for `wafrift_recon::active`.
# Each rule matches a single response header (name compared case-insensitively).
# Optional `value_prefix` / `value_contains` are ASCII case-insensitive.

[[rule]]
family = "waf"
id = "cloudflare"
header = "cf-ray"

[[rule]]
family = "waf"
id = "sucuri"
header = "x-sucuri-id"

[[rule]]
family = "waf"
id = "akamai"
header = "server"
value_contains = "akamaighost"

[[rule]]
family = "cdn"
id = "cloudflare"
header = "server"
value_prefix = "cloudflare"

[[rule]]
family = "cdn"
id = "fastly"
header = "x-fastly-request-id"

[[rule]]
family = "framework"
id = "express"
header = "x-powered-by"
value_contains = "express"

[[rule]]
family = "framework"
id = "drupal"
header = "x-generator"
value_contains = "drupal"

# R73 pass-21 §3 CAPABILITY: WAFs that `wafrift_oracle::markers` knows
# about but `wafrift_recon` did NOT — leading to `wafrift detect` /
# `wafrift recon` returning "unknown WAF" while the oracle separately
# would have flagged the same target. Closing the cross-subsystem
# drift identified in the innovation+capability audit.

[[rule]]
family = "waf"
id = "aws-waf"
header = "x-amzn-waf-action"

[[rule]]
family = "waf"
id = "aws-waf-cloudfront"
header = "x-amz-cf-id"

[[rule]]
family = "waf"
id = "imperva"
header = "x-iinfo"

[[rule]]
family = "waf"
id = "imperva-incap"
header = "x-cdn"
value_contains = "incapsula"

[[rule]]
family = "waf"
id = "f5-bigip-asm"
header = "x-asm-ver"

[[rule]]
family = "waf"
id = "f5-bigip"
header = "x-f5-bigip-stat"

[[rule]]
family = "waf"
id = "cloudflare-bot-mgmt"
header = "cf-mitigated"

[[rule]]
family = "waf"
id = "bunkerweb"
header = "server"
value_contains = "bunkerweb"

[[rule]]
family = "waf"
id = "wallarm"
header = "x-wallarm-mode"
