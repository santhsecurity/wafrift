# Tier-B WAF block-page body signatures (case-insensitive substrings).
#
# Many WAFs (Cloudflare, Akamai, Imperva/Incapsula, F5 BIG-IP ASM, AWS WAF, …)
# serve their block / challenge interstitial with an HTTP **200** status. A
# status-only oracle reads that as the attack PASSING — a fabricated bypass.
# When a 2xx response body contains one of these high-precision phrases, the
# live oracle classifies it as Blocked instead.
#
# Bias: PRECISION over recall. A false "blocked" on a legitimate 200 page would
# corrupt the differential, so only phrases that strongly indicate a block
# interstitial belong here. Missing a block page merely reverts to status-only
# behaviour. Add your target's specific block-page string to extend coverage.

signature = [
  "access denied",
  "request blocked",
  "this request was blocked",
  "you have been blocked",
  "your request has been blocked",
  "attention required",                  # Cloudflare challenge
  "the requested url was rejected",      # F5 BIG-IP ASM
  "web application firewall",
  "request unsuccessful. incapsula",     # Imperva/Incapsula
  "powered by incapsula",
  "blocked by mod_security",
  "modsecurity action",
  "this website is using a security service to protect itself",  # Cloudflare
  "sorry, you have been blocked",        # Cloudflare
  "generated by cloudfront",             # AWS CloudFront/WAF 403 body
  "request rejected by xss",
]
