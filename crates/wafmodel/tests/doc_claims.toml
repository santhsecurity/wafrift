# E10/75 — doc-claim ledger. Every load-bearing claim the crate's
# public docs (lib.rs crate doc + README.md) make is registered here
# and bound to a REAL test that fails if the claim becomes false.
#
# `claim` MUST be a verbatim substring of `source` (so a claim cannot
# be invented here, and deleting it from the docs fails the audit).
# `proven_by` MUST be the name of a real `fn` in tests/ (so the proof
# cannot be a phantom). `status` is "proven" or "open"; the auditor
# ratchets open→0 and forbids silent shrinkage of the ledger.

