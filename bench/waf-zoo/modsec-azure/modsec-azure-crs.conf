# modsec-azure-crs.conf
# Rule exclusions + overrides that approximate the delta between
# OWASP CRS PL2 and Azure Application Gateway WAF v2 DefaultRuleSet 2.1.
#
# References:
#   https://learn.microsoft.com/en-us/azure/web-application-firewall/ag/application-gateway-crs-rulegroups-rules
#   https://learn.microsoft.com/en-us/azure/web-application-firewall/ag/waf-sensitive-data-protection
#   https://github.com/Azure/azure-waf-crs (community-maintained, unofficial)
#
# Azure EXCLUDED rules (disabled in Azure's DefaultRuleSet 2.1 by default):
#   920300 - Request Missing an Accept Header   (Azure web apps often omit this)
#   920320 - Missing User Agent Header          (SDK/tooling traffic omits UA)
#   920350 - Host header is a numeric IP addr   (Azure internal health probes)
#   920420 - Request content type not allowed   (Azure allows more mime types)
#   920430 - HTTP protocol version not allowed  (Azure allows HTTP/1.0 probes)
#   921151 - HTTP Request Smuggling (TE+CL)     (handled by Azure Front Door layer)
#   942200 - SQL Injection via MySQL comment    (false positive on Azure SQL params)
#   942260 - SQL Injection — basic quoting     (high FP on Azure SQL SDK params)
#   942340 - SQL Injection — basic concat       (high FP on Azure Cosmos SDK)
#   942430 - SQL Injection — restricted chars  (Azure SDK query strings trigger)
#   950130 - Remote file inclusion: empty value (noisy on Azure Blob Storage URLs)

SecRuleRemoveById 920300
SecRuleRemoveById 920320
SecRuleRemoveById 920350
SecRuleRemoveById 920420
SecRuleRemoveById 920430
SecRuleRemoveById 921151
SecRuleRemoveById 942200
SecRuleRemoveById 942260
SecRuleRemoveById 942340
SecRuleRemoveById 942430
SecRuleRemoveById 950130

# Azure SCORE OVERRIDES: Azure reduces severity on certain rules to bring their
# anomaly score contribution down from CRITICAL (5) to NOTICE (2), reducing
# false-positive rate at the default threshold of 6.
# Rules affected (derived from Azure WAF tuning guidance):
#   942110 - SQL Injection: sqli_score
#   942150 - SQL Injection: specific patterns
SecRuleUpdateSeverityById 942110 "NOTICE"
SecRuleUpdateSeverityById 942150 "NOTICE"

# Azure-specific body inspection limit: Azure AppGW WAF v2 inspects the first
# 128 KB of request body by default (not unlimited like vanilla modsec).
# Emulate this so evasions relying on body-size bypass are testable.
SecRequestBodyLimit 131072
SecRequestBodyNoFilesLimit 131072
