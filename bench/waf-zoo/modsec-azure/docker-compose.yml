# ModSecurity + Azure Application Gateway WAF v2 ruleset emulation.
#
# Azure AppGW WAF v2 ships with OWASP CRS 3.2 as its default rule set, plus
# a set of Azure-specific exclusions and managed rule overrides documented at:
#   https://learn.microsoft.com/en-us/azure/web-application-firewall/ag/application-gateway-crs-rulegroups-rules
#   https://learn.microsoft.com/en-us/azure/web-application-firewall/ag/application-gateway-waf-faq
#
# Key differences from vanilla CRS 3.2:
# - Default mode is Detection (log only) on first enable; we force BLOCKING here
#   so the bench gets clear 403 signals.
# - Azure excludes a set of rules that fired heavily on Azure PaaS traffic:
#   see modsec-azure-crs.conf for the full exclusion list.
# - Azure's "Anomaly Scoring" threshold default is 6 for inbound.
#
# We use the CRS 4-apache image (latest stable) rather than a CRS 3.2 image
# because CRS 4 is backwards-compatible with 3.2 exclusion patterns and the
# bench measures bypass rates not version fidelity.
#
# Image digest pinned 2026-05-24:
#   docker pull owasp/modsecurity-crs:4-apache-202604040104
#   owasp/modsecurity-crs@sha256:8eb19c64d84d48dd8435c878fb9b6d3028e5da292752155fd1e697dccc51b495
services:
  wafrift-modsec-azure:
    image: owasp/modsecurity-crs:4-apache-202604040104@sha256:8eb19c64d84d48dd8435c878fb9b6d3028e5da292752155fd1e697dccc51b495
    container_name: wafrift-modsec-azure
    environment:
      # Azure AppGW WAF v2 default anomaly threshold is 6 (inbound).
      PARANOIA: "2"
      BLOCKING_PARANOIA: "2"
      DETECTION_PARANOIA: "2"
      EXECUTING_PARANOIA: "2"
      ANOMALY_INBOUND: "6"
      ANOMALY_OUTBOUND: "4"
      SERVER_NAME: "wafrift-bench"
      BACKEND: "http://backend:80"
    volumes:
      # Azure-delta: exclusions + overrides mirroring Azure's managed rule group.
      - ./modsec-azure-crs.conf:/etc/modsecurity.d/owasp-crs/rules/RESPONSE-999-EXCEPTIONS.conf:ro
    ports:
      - "18102:8080"
    depends_on:
      - backend
    networks:
      - wafrift-modsec-azure

  backend:
    image: kennethreitz/httpbin@sha256:599fe5e5073102dbb0ee3dbb65f049dab44fa9fc251f6835c9990f8fb196a72b
    container_name: wafrift-modsec-azure-backend
    networks:
      - wafrift-modsec-azure

networks:
  wafrift-modsec-azure:
