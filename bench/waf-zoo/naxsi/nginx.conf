# nginx config for the waf-zoo/naxsi bench stack.
# Identical in structure to wafrift-bench/targets/naxsi/nginx.conf.
# Run as root inside the container (debian:bookworm-slim doesn't ship
# the `nobody` group; the container is the security boundary).

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';
    access_log /var/log/nginx/access.log main;

    sendfile        on;
    keepalive_timeout 65;

    # Naxsi core rules installed from source into /etc/nginx/naxsi_rules/.
    include /etc/nginx/naxsi_rules/*.rules;

    upstream backend {
        server backend:80;
    }

    server {
        listen 8080;
        server_name _;

        location / {
            include /etc/nginx/naxsi.conf;
            proxy_pass         http://backend;
            proxy_set_header   Host            $host;
            proxy_set_header   X-Real-IP       $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Naxsi denial routing: return 403 (clear block signal for the bench).
        location /RequestDenied {
            return 403;
        }
    }
}
