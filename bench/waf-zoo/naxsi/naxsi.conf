# Naxsi runtime config for the waf-zoo/naxsi bench stack.
# LearningMode is OFF — every triggered rule is enforced as a block.

SecRulesEnabled;
DeniedUrl "/RequestDenied";

# Score thresholds: block as soon as any single category score is reached.
# Biased toward "block early" so the bench measures maximum WAF coverage.
# These match the production-recommended thresholds from the Naxsi documentation.
CheckRule "$SQL >= 4"       BLOCK;
CheckRule "$RFI >= 4"       BLOCK;
CheckRule "$TRAVERSAL >= 3" BLOCK;
CheckRule "$EVADE >= 3"     BLOCK;
CheckRule "$XSS >= 4"       BLOCK;
CheckRule "$UPLOAD >= 8"    BLOCK;
