# modsec-aws-crs.conf
# Rule exclusions + scoring adjustments that approximate the delta between
# OWASP CRS PL2 and AWSManagedRulesCommonRuleSet (ACR).
#
# References:
#   https://docs.aws.amazon.com/waf/latest/developerguide/aws-managed-rule-groups-baseline.html
#   https://docs.aws.amazon.com/waf/latest/developerguide/waf-rule-statement-type-managed-rule-group.html
#
# AWS CRS EXCLUDED rules (AWS does not enable these from CRS):
#   920120 - Attempted multipart/form-data bypass  (AWS excludes, low S/N)
#   920300 - Request Missing an Accept Header       (too noisy for API traffic)
#   920320 - Missing User Agent Header              (bot detection handled elsewhere)
#   921151 - HTTP Request Smuggling (TE+CL)        (handled at LB layer by ALB)
#   942110 - SQL Injection via sqli_score           (ACR uses its own SQL engine)
#   942150 - SQL Injection — specific patterns     (ditto)
#   942410 - SQL Injection — UNION SELECT           (ACR SQL engine supersedes)
#   942490 - SQL Injection — detect classic sqli    (ditto)

SecRuleRemoveById 920120
SecRuleRemoveById 920300
SecRuleRemoveById 920320
SecRuleRemoveById 921151
SecRuleRemoveById 942110
SecRuleRemoveById 942150
SecRuleRemoveById 942410
SecRuleRemoveById 942490

# AWS CRS SCORE OVERRIDES: ACR raises the inbound anomaly threshold on a
# handful of rules to reduce false-positive rate on diverse customer traffic.
# We replicate by bumping the per-rule severity rather than the threshold.
# Rules that AWS considers LOW severity (score +1 not +5):
SecRuleUpdateActionById 920170 "pass,nolog,noauditlog"
SecRuleUpdateActionById 920180 "pass,nolog,noauditlog"

# AWS EXTRA RULES: ACR ships rules beyond CRS. We stub the most impactful
# ones here so the rule-IDs exist and fire on matching traffic. Note that the
# exact regex payloads below are derived from public AWS WAF bypass writeups
# and the AWS WAF API security sample templates — they are NOT the original
# AWS rule source (which is proprietary).

# Cross-site scripting: AWS adds a URI-path XSS check that CRS lacks at PL2.
SecRule REQUEST_URI "@rx (?i:<script|javascript:|vbscript:|onload\s*=|onerror\s*=|onclick\s*=)" \
    "id:9001001,\
    phase:1,\
    deny,\
    status:403,\
    log,\
    msg:'AWS-CRS XSS in URI path',\
    tag:'attack-xss',\
    tag:'OWASP_CRS',\
    severity:'CRITICAL'"

# Log4Shell / JNDI: AWS added this rule after CVE-2021-44228. CRS adds it in
# REQUEST-944, but AWS fires it at a lower threshold.
SecRule REQUEST_LINE|ARGS|ARGS_NAMES|REQUEST_HEADERS "@rx \$\{.*jndi:" \
    "id:9001002,\
    phase:2,\
    deny,\
    status:403,\
    log,\
    msg:'AWS-CRS Log4Shell JNDI lookup attempt',\
    tag:'attack-log4shell',\
    severity:'CRITICAL'"
