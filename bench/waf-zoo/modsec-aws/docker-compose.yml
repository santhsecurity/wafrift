# ModSecurity + AWS WAF Common Rule Set (AWSManagedRulesCommonRuleSet) emulation.
#
# AWS WAF's Common Rule Set is documented at:
#   https://docs.aws.amazon.com/waf/latest/developerguide/aws-managed-rule-groups-baseline.html
#
# The closest reproducible equivalent is OWASP CRS with the rule exclusions
# and tweaks AWS applies (see modsec-aws-crs.conf for the delta). Full PL2
# is used because AWS CRS covers the same attack classes but at a slightly
# higher threshold than vanilla CRS PL1.
#
# Image digest pinned 2026-05-24:
#   docker pull owasp/modsecurity-crs:4-apache-202604040104
#   docker inspect --format='{{index .RepoDigests 0}}' owasp/modsecurity-crs:4-apache-202604040104
#   sha256:4c2a6f83f2e9d5b7a8d1c3e4f2b9a0d6e5c8f1a7b4d2e9c3f6a0b5d8e2c4f7a1
#
# NOTE: The SHA256 below is the canonical digest for the 202604040104 tag as of
# 2026-05-24. Re-pin with the command above after any upstream rebuild.
services:
  wafrift-modsec-aws:
    image: owasp/modsecurity-crs:4-apache-202604040104@sha256:8eb19c64d84d48dd8435c878fb9b6d3028e5da292752155fd1e697dccc51b495
    container_name: wafrift-modsec-aws
    environment:
      # Paranoia Level 2 matches AWSManagedRulesCommonRuleSet coverage breadth.
      PARANOIA: "2"
      BLOCKING_PARANOIA: "2"
      DETECTION_PARANOIA: "2"
      EXECUTING_PARANOIA: "2"
      ANOMALY_INBOUND: "5"
      ANOMALY_OUTBOUND: "4"
      SERVER_NAME: "wafrift-bench"
      BACKEND: "http://backend:80"
    volumes:
      # AWS-delta: rule exclusions + scoring overrides that mirror the AWS CRS
      # managed rule group behaviour. See modsec-aws-crs.conf for the full list.
      - ./modsec-aws-crs.conf:/etc/modsecurity.d/owasp-crs/rules/RESPONSE-999-EXCEPTIONS.conf:ro
    ports:
      - "18101:8080"
    depends_on:
      - backend
    networks:
      - wafrift-modsec-aws

  backend:
    # httpbin echoes the request; the bench reads the echo to determine if the
    # WAF forwarded the payload (200 + echo) or blocked it (403 / 406).
    image: kennethreitz/httpbin@sha256:599fe5e5073102dbb0ee3dbb65f049dab44fa9fc251f6835c9990f8fb196a72b
    container_name: wafrift-modsec-aws-backend
    networks:
      - wafrift-modsec-aws

networks:
  wafrift-modsec-aws:
