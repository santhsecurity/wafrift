# Coraza WAF — Go reimplementation of ModSecurity.
#
# Coraza is the WAF engine used by Fastly's Next-Gen WAF (formerly Signal Sciences),
# Traefik Enterprise, and several cloud-edge platforms. Its HTTP parsing and
# multi-part body handling differ from libmodsecurity3, so it exhibits a distinct
# bypass surface even when running the same OWASP CRS rules.
#
# No pre-built coraza-caddy image is published on Docker Hub or ghcr.io.
# We build from source using a multi-stage Dockerfile:
#   Stage 1: golang:1.22 — build Caddy with the xcaddy + coraza_waf plugin
#   Stage 2: debian:bookworm-slim — runtime with the Caddy binary + Caddyfile
#
# Pinned versions (2026-05-24):
#   Caddy         2.8.4    https://github.com/caddyserver/caddy/releases/tag/v2.8.4
#   coraza-caddy  0.3.2    https://github.com/corazawaf/coraza-caddy/releases/tag/v0.3.2
#   OWASP CRS     4.3.0    pulled by coraza-caddy at build time from corazawaf/coraza-coreruleset
#
# First build takes ~3-5 min (Go module download + compile).
services:
  wafrift-coraza:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        CADDY_VERSION: "v2.8.4"
        CORAZA_CADDY_VERSION: "v2.0.0"
    image: wafrift/zoo-coraza:caddy2.8.4-coraza2.0.0
    container_name: wafrift-zoo-coraza
    ports:
      - "18103:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
    depends_on:
      - backend
    networks:
      - wafrift-zoo-coraza

  backend:
    image: kennethreitz/httpbin@sha256:599fe5e5073102dbb0ee3dbb65f049dab44fa9fc251f6835c9990f8fb196a72b
    container_name: wafrift-zoo-coraza-backend
    networks:
      - wafrift-zoo-coraza

networks:
  wafrift-zoo-coraza:
