# Shadow Daemon WAF — modular web application firewall.
#
# Shadow Daemon (https://shadowd.zecure.org/) is an open-source WAF with a
# three-component architecture:
#   shadowd    — the daemon that receives request data and scores it
#   connector  — a language-specific library installed inside the web app
#   database   — PostgreSQL backend for shadowd's rule/profile state
#
# Architecture for this bench stack:
#
#   wafrift  ──HTTP──►  php-app (port 18105)  ──shadowd API──►  shadowd daemon
#                          nginx + PHP + shadowd-php connector         │
#                                                                  PostgreSQL
#
# The php-app image is built from source (Dockerfile in this directory).
# It installs the shadowd-php connector via Composer into a minimal PHP echo
# app, so the bench can send payloads as POST/GET parameters and shadowd
# scores them in-process.
#
# Pinned image digests (2026-05-24):
#   zecure/shadowd@sha256:a7d72e9591e6bf8a81df8d18bb6d7660c358f47bde74f7f52d32c1bcfbd15914
#   postgres:16-alpine  (pinned by tag; re-pin via docker inspect after pull)
#
# No secrets or API keys in this file. The shared key between the connector
# and shadowd daemon is a fixed bench value — it never leaves the local
# Docker network.
services:
  wafrift-zoo-shadowd:
    image: zecure/shadowd@sha256:a7d72e9591e6bf8a81df8d18bb6d7660c358f47bde74f7f52d32c1bcfbd15914
    container_name: wafrift-zoo-shadowd
    environment:
      # shadowd reads a .ini config at /etc/shadowd/shadowd.ini
      # Override via env vars that the image entrypoint maps.
      # See: https://shadowd.zecure.org/documentation/shadowd/
      SHADOWD_ADDRESS: "0.0.0.0"
      SHADOWD_PORT: "9115"
      SHADOWD_DB_DRIVER: "pgsql"
      SHADOWD_DB_HOST: "wafrift-zoo-shadowd-db"
      SHADOWD_DB_PORT: "5432"
      SHADOWD_DB_NAME: "shadowd"
      SHADOWD_DB_USER: "shadowd"
      # Non-secret bench password — local Docker network only.
      SHADOWD_DB_PASSWORD: "benchonly"
      SHADOWD_LOG: "/var/log/shadowd/shadowd.log"
      SHADOWD_DAEMON: "0"
    depends_on:
      - wafrift-zoo-shadowd-db
    networks:
      - wafrift-zoo-shadowd

  wafrift-zoo-shadowd-db:
    image: postgres:16-alpine
    container_name: wafrift-zoo-shadowd-db
    environment:
      POSTGRES_DB: shadowd
      POSTGRES_USER: shadowd
      POSTGRES_PASSWORD: benchonly
    networks:
      - wafrift-zoo-shadowd

  # PHP echo app with the shadowd-php connector installed.
  # Built from source (Dockerfile) — no pre-built image available.
  wafrift-zoo-shadowd-php:
    build:
      context: .
      dockerfile: Dockerfile
    image: wafrift/zoo-shadowd-php:latest
    container_name: wafrift-zoo-shadowd-php
    ports:
      - "18105:80"
    environment:
      SHADOWD_HOST: "wafrift-zoo-shadowd"
      SHADOWD_PORT: "9115"
      # Profile ID 1 is shadowd's default first profile.
      SHADOWD_PROFILE: "1"
      # Shared key between connector and daemon. Fixed bench value.
      SHADOWD_KEY: "wafrift-bench-key-2026"
    depends_on:
      - wafrift-zoo-shadowd
    networks:
      - wafrift-zoo-shadowd

networks:
  wafrift-zoo-shadowd:
