# Shadow Daemon WAF — modular web application firewall.
#
# Redesigned 2026-05-25: replaced non-existent zecure/shadowd_php image with a
# PostgreSQL-backed stack where the PHP connector app is built from our Dockerfile.
#
# Architecture:
#
#   bench/wafrift ──HTTP──► nginx+PHP-FPM (port 18105)
#                            │  (shadowd PHP connector embedded in app)
#                            └──shadowd API (TCP 9115)──► shadowd daemon
#                                                          │
#                                                          └──PostgreSQL DB
#
# Three services:
#   db       — postgres:15-alpine; schema + bench profile seeded via init scripts
#   shadowd  — zecure/shadowd daemon (reads DB; listens on port 9115)
#   app      — built from Dockerfile: nginx + PHP-FPM + shadowd PHP connector
#
# Image digest pinned 2026-05-25:
#   docker pull zecure/shadowd:latest
#   sha256:a7d72e9591e6bf8a81df8d18bb6d7660c358f47bde74f7f52d32c1bcfbd15914

services:
  db:
    image: postgres:15-alpine
    container_name: wafrift-zoo-shadowd-db
    environment:
      POSTGRES_DB:       shadowd
      POSTGRES_USER:     shadowd
      POSTGRES_PASSWORD: shadowd
    volumes:
      - ./pgsql_layout.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
      - ./init.sql:/docker-entrypoint-initdb.d/02_seed.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shadowd -d shadowd"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - wafrift-zoo-shadowd

  shadowd:
    image: zecure/shadowd:latest@sha256:a7d72e9591e6bf8a81df8d18bb6d7660c358f47bde74f7f52d32c1bcfbd15914
    container_name: wafrift-zoo-shadowd
    environment:
      SHADOWD_ADDRESS:     0.0.0.0
      SHADOWD_DB_DRIVER:   pgsql
      SHADOWD_DB_HOST:     db
      SHADOWD_DB_PORT:     5432
      SHADOWD_DB_NAME:     shadowd
      SHADOWD_DB_USER:     shadowd
      SHADOWD_DB_PASSWORD: shadowd
    depends_on:
      db:
        condition: service_healthy
    networks:
      - wafrift-zoo-shadowd

  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: wafrift/zoo-shadowd-app:2026-05-25
    container_name: wafrift-zoo-shadowd-php
    ports:
      - "18105:80"
    depends_on:
      - shadowd
    networks:
      - wafrift-zoo-shadowd

networks:
  wafrift-zoo-shadowd:
