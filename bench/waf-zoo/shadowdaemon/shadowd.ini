; shadowd PHP connector configuration.
; Deployed to /etc/shadowd/connectors.ini (SHADOWD_DEFAULT_CONFIG_FILE).
; Values are baked in at image build time — the connector does not expand
; shell-style ${VAR} references; all values must be literals.
;
; https://shadowd.zecure.org/documentation/php_connector/

[shadowd_php]
; Connection to the shadowd daemon. "shadowd" is the Docker Compose service name.
host        = shadowd
port        = 9115

; Profile ID and shared key must match the profile in the PostgreSQL DB.
; Profile 1 is seeded by init.sql on first DB startup.
profile     = 1
key         = wafrift-bench-key-2026

; Log file inside the container.
log         = /var/log/shadowd/connector.log

; Observe mode: 0 = block (return 403 on threat), 1 = log only.
; Blocking mode so the bench gets clear 403 signals.
observe     = 0

; Debug: 0 = off. Set to 1 for verbose request logging during troubleshooting.
debug       = 1
