; shadowd PHP connector configuration.
; Read by the connector at runtime.
; https://shadowd.zecure.org/documentation/php_connector/

[shadowd_php]
; Connection to the shadowd daemon. The host is the Docker service name.
host        = ${SHADOWD_HOST}
port        = ${SHADOWD_PORT}

; Profile ID and shared key must match the profile configured in shadowd.
; For the bench stack: profile 1, key set to the bench value.
profile     = ${SHADOWD_PROFILE}
key         = ${SHADOWD_KEY}

; Log file inside the container.
log         = /var/log/shadowd/connector.log

; Observe mode: 0 = block (return 403 on threat), 1 = log only.
; We want blocking mode so the bench gets clear 403 signals.
observe     = 0

; Debug: set to 1 to log all requests (very verbose, useful for initial setup).
debug       = 0
