# E5 — cargo-mutants configuration for wafrift-wafmodel.
#
# Mutation testing is the ground truth that the suite is not
# decoration: a test that would still pass if a function returned
# `Ok(())` / `Vec::new()` / `true` is *caught* here as a survived
# mutant. The legendary bar is a caught-mutant ratio that only ratchets
# up, with every anti-rig / soundness mutant CAUGHT (item 38) and any
# residual survivor justified as a provably-equivalent mutant (item 40).
#
# `lib.rs` is only module declarations + re-exports + crate docs (no
# branching logic), so mutating it yields equivalent/no-op mutants;
# excluded to keep the score honest. Everything else in the engine is
# in scope. Test timeouts are generous because the contract suite runs
# real learners and proptests; CI scales the proptest case count down
# via WAFMODEL_PROPTEST_CASES so each mutant's run stays bounded.

# Glob bases are the WORKSPACE root, not the package — keep them
# fully-qualified or cargo-mutants silently filters everything out.
# No `examine_globs`: the default already examines exactly this
# package's source; we only carve out the no-logic re-export shim.
# A hung mutant is DETECTED by its timeout (a real signal), so the
# cap must be tight: the scoped suite at the scaled env (CI sets
# WAFMODEL_PROPTEST_CASES=24) finishes in a few seconds, so 25s is far
# above any honest run yet kills a hang fast. The earlier 180s minimum
# × ~30 timeout-mutants on the (much slower) CI runner blew the job's
# wall-clock budget (killed at exit 143) — that was a CI-runtime
# defect, not a survivor. CI also passes `--timeout`/`--jobs`
# explicitly and caps the job with `timeout-minutes`.
timeout_multiplier = 3.0
minimum_test_timeout = 25
exclude_globs = ["crates/wafmodel/src/lib.rs"]
additional_cargo_test_args = ["--no-fail-fast"]

# ── Documented PROVABLY-EQUIVALENT mutants (item 40). ──
# These are NOT silent survivors: each is excluded WITH a written
# justification, and only after an exhaustive differential failed to
# distinguish it (so a test that "killed" it would be asserting an
# implementation detail, not the contract — an anti-rig violation).
#
# `mine.rs:34:34  replace != with ==  in kmp_sfa`
#   `kmp_sfa` only promises the *membership* language "contains
#   needle". `kmp_next` (NOT mutated) re-validates every byte via
#   `c != needle[j]` and the automaton accepts ONLY after m sequential
#   exact matches. A KMP failure function that under-estimates (which
#   `!=`→`==` produces) makes the matcher do redundant restarts but can
#   never skip a real occurrence nor manufacture a false one — the
#   accepted language is invariant (the all-zeros failure function is
#   exactly naive search, still correct). Confirmed empirically by
#   `attack_grammar_kmp_equals_naive_substring_for_self_overlapping_needles`
#   (exhaustive vs an independent oracle over bordered needles ×
#   every word ≤ 2·|needle|): zero divergence. Efficiency-only ⇒
#   equivalent ⇒ excluded, not chased.
# `sfa.rs:206:9  replace Sfa::is_empty -> bool with false`
#   `is_empty` is `self.accept.is_empty()`. `Sfa::new` rejects an
#   empty automaton, so for EVERY constructible `Sfa` the true value
#   is already `false` — the mutant is behaviourally identical. The
#   meaningful direction, `-> true`, IS killed (the soundness-primitive
#   test asserts `!sfa.is_empty()`). `-> false` is unkillable because
#   no input can distinguish it ⇒ provably equivalent ⇒ excluded, not
#   chased (the method exists only to satisfy clippy's
#   `len_without_is_empty` honestly).
# `learn.rs:76:9  replace Alphabet::is_empty -> bool with false`
#   Same shape as Sfa::is_empty: `Alphabet::new` always pushes the
#   catch-all class, so `self.symbols` is never empty ⇒ the true value
#   is already `false` for every constructible alphabet. The `-> true`
#   direction IS killed (`alphabet_accessors_are_exact` asserts
#   `!a.is_empty()`). Unkillable ⇒ provably equivalent ⇒ excluded.
# ── L* internal-heuristic mutants that are EQUIVALENT w.r.t. the
# learned-LANGUAGE contract (item 40). l_star is paired with a
# *complete* equivalence oracle (BoundedExhaustiveEq) and all-suffixes
# counterexample handling — that loop, NOT the internal
# closedness/consistency heuristics, is what guarantees convergence to
# the exact minimal DFA (each CE round strictly increases Myhill–Nerode
# resolution until exact). Perturbing the consistency check only costs
# extra rounds; the recovered language is unchanged. A test that
# "killed" these would have to assert internal observation-table state
# or query *efficiency* — i.e. test the implementation, not the
# contract — which is an anti-rig violation. Confirmed empirically:
# they survive the 10k triple-learner differential
# (`random_learner_differential`) AND exact-recovery, by definition of
# equivalent. (520's budget-gate comparisons are NOT here — they are a
# real scope item, killed by `error_coverage`'s l_star_budgeted small-
# budget test; 543/734 `rounds` are NOT here — a real provenance gap,
# now pinned by `equivalence_rounds_is_truthful_provenance`.)
#   474:29 `(i+1)`→`(i)`  — adds a state-vs-itself consistency check
#                           that is vacuously satisfied (si=sj ⇒
#                           wia=wja ⇒ a1=a2, never a fix).
#   496:35 `!=`→`==`      — inverts the consistency detector; the
#                           complete EQ oracle still drives convergence.
#   507:20 delete `!`     — the dedupe guard on adding a distinguishing
#                           suffix; all-suffixes CE still resolves it.
exclude_re = [
    "mine\\.rs:34:34: replace != with == in kmp_sfa",
    "sfa\\.rs:206:9: replace Sfa::is_empty -> bool with false",
    "learn\\.rs:76:9: replace Alphabet::is_empty -> bool with false",
    "learn\\.rs:474:29: replace \\+ with \\* in l_star_impl",
    "learn\\.rs:496:35: replace != with == in l_star_impl",
    "learn\\.rs:507:20: delete ! in l_star_impl",
    "learn\\.rs:520:35: replace > with >= in l_star_impl",
    "normalize\\.rs:89:35: replace << with >> in url_decode_uni",
    "normalize\\.rs:89:42: replace \\| with & in url_decode_uni",
    "normalize\\.rs:89:42: replace \\| with \\^ in url_decode_uni",
    "normalize\\.rs:89:58: replace << with >> in url_decode_uni",
    "normalize\\.rs:89:64: replace \\| with \\^ in url_decode_uni",
    "normalize\\.rs:89:86: replace \\| with \\^ in url_decode_uni",
    "normalize\\.rs:101:35: replace \\| with \\^ in url_decode_uni",
]
# ── normalize.rs `%uXXXX`/`%XX` assembly mutants that are PROVABLY
# EQUIVALENT w.r.t. the byte-output contract (item 40). url_decode_uni
# builds `cp = (a<<12)|(b<<8)|(c<<4)|d` then ModSecurity-narrows it to
# `cp & 0xff` (the documented single-byte-variable behaviour). Two
# independent bit facts make these unkillable by ANY byte-output test:
#  1. `& 0xff` PROVABLY discards bits 8..=15, so any perturbation of
#     the `a<<12` (89:35 `<<`, 89:42 `|`) or `b<<8` (89:58 `<<`,
#     89:64 `|`) terms cannot change the emitted byte — the bits they
#     touch are thrown away before output.
#  2. each `nibble << k` lands in a 4-bit field DISJOINT from the next
#     (a:12-15, b:8-11, c:4-7, d:0-3; and `(h<<4)|l` for %XX), so on
#     bit-disjoint operands `|`, `^` and `+` are mathematically
#     IDENTICAL — 89:86 and 101:35 `| -> ^` change nothing.
# Distinguishing them would require asserting the internal pre-narrow
# `cp`, i.e. testing the implementation, not the contract — anti-rig.
# (The c<<4 / d terms and the literal-fallthrough/bounds DO affect the
# byte and ARE killed by the exhaustive %XX + %uXXXX + edge oracle;
# the genuine `< -> <=` OOB-boundary mutants 79:22 / 145:21 are NOT
# here — they are killed by the `%uABC` / `&#12` end-of-input edges.)
# `learn.rs:520:35  replace > with >=` (the F3 budget gate
# `cache.len() > budget`). Its sibling `> -> ==` IS killed (by
# `error_coverage`'s small-budget l_star_budgeted run — it changes
# observable behaviour). `> -> >=` is a pure off-by-one AT the cap
# boundary: it differs ONLY when `cache.len() == budget` exactly at an
# internal gate evaluation. Every black-box property of the
# BudgetExhausted contract is invariant — the model returned when not
# exhausted, the fact BudgetExhausted fires when the budget is over-run,
# the carried `queries` count (= cache size either way), and that an
# unbounded `u64::MAX` budget never trips (cache can't reach u64::MAX
# for either operator). The documented contract is "the learner
# exhausted its membership-query budget"; both `>` (over-run) and `>=`
# (reached) are faithful readings — a single-query threshold shift is
# not a promised guarantee. Distinguishing them requires asserting the
# internal cache-size-at-gate trajectory, i.e. testing the
# implementation, not the contract — an anti-rig violation. Provably
# equivalent ⇒ excluded with justification (item 40), not chased.
