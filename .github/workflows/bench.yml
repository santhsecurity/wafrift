name: Nightly WAF Benchmark

on:
  workflow_dispatch:
    inputs:
      stack:
        description: 'WAF stack to bench (modsec-pl1, modsec-pl2, modsec-pl3, modsec-pl4, coraza, bunkerweb, naxsi)'
        required: false
        default: 'modsec-pl1'
      strategies:
        description: 'Comma-separated evasion strategies (light,medium,heavy,mcts,equiv-cegis,differential,smuggling,content-type,...)'
        required: false
        # `heavy,equiv-cegis` matches the in-tree `bench-waf` default
        # (the same engine shipped under `wafrift scan`). Manual dispatch
        # can opt into deeper sets (e.g. `all`) without touching this file.
        default: 'heavy,equiv-cegis'
      variants:
        description: 'Variants per case per strategy'
        required: false
        # 20 = the depth used to generate the headline numbers in
        # README. 5 was smoke-only and produced misleadingly thin
        # per-(WAF × class) coverage on the public scoreboard.
        default: '20'
  schedule:
    # 02:00 UTC daily — only fires from main branch.
    - cron: '0 2 * * *'

jobs:
  bench:
    name: Bench WAF stacks
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        stack: [modsec-pl1, modsec-pl2, modsec-pl3, modsec-pl4, coraza, bunkerweb, naxsi]
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build wafrift-cli (release)
        run: cargo build --release -p wafrift-cli

      - name: Bring up ${{ matrix.stack }}
        run: bash wafrift-bench/scripts/up.sh ${{ matrix.stack }}

      - name: Determine port
        id: port
        run: |
          case "${{ matrix.stack }}" in
            modsec-pl1) echo "p=18081" >> "$GITHUB_OUTPUT" ;;
            modsec-pl2) echo "p=18082" >> "$GITHUB_OUTPUT" ;;
            modsec-pl3) echo "p=18083" >> "$GITHUB_OUTPUT" ;;
            modsec-pl4) echo "p=18084" >> "$GITHUB_OUTPUT" ;;
            coraza)     echo "p=18085" >> "$GITHUB_OUTPUT" ;;
            bunkerweb)  echo "p=18086" >> "$GITHUB_OUTPUT" ;;
            naxsi)      echo "p=18087" >> "$GITHUB_OUTPUT" ;;
          esac

      - name: Run wafrift bench-waf with --evade
        run: |
          mkdir -p wafrift-bench/results
          ./target/release/wafrift bench-waf \
            --base-url http://127.0.0.1:${{ steps.port.outputs.p }} \
            --corpus wafrift-bench/corpus \
            --evade \
            --strategies ${{ inputs.strategies || 'heavy' }} \
            --variants ${{ inputs.variants || '5' }} \
            --format json \
            --output wafrift-bench/results/${{ matrix.stack }}-$(date -u +%Y%m%d).json
        env:
          RUST_LOG: warn

      - name: Tear down ${{ matrix.stack }}
        if: always()
        run: bash wafrift-bench/scripts/down.sh ${{ matrix.stack }}

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bench-${{ matrix.stack }}
          path: wafrift-bench/results/

  # ── Public bypass scoreboard ──────────────────────────────────────
  # Collates the per-stack JSON artifacts into a (WAF × payload-class)
  # markdown table at docs/SCOREBOARD.md. On the scheduled (nightly)
  # run from `main`, commits the refreshed scoreboard so the public
  # facing dashboard tracks the latest verified numbers. On manual
  # dispatch the rendered file is uploaded as a build artifact only —
  # no commit, no race with maintainer pushes.
  scoreboard:
    name: Scoreboard
    needs: bench
    runs-on: ubuntu-latest
    if: always()  # render even if some stacks failed; partial table > no table
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          # Need a writable, fast-forward-able checkout for the commit step.
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Download all bench artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: bench-*
          path: bench-artifacts
          merge-multiple: true

      - name: Render scoreboard
        run: |
          mkdir -p docs
          python wafrift-bench/scripts/render-scoreboard.py bench-artifacts/ \
              --output docs/SCOREBOARD.md
          echo '─── scoreboard preview ───────────────────────────────────────'
          cat docs/SCOREBOARD.md

      - name: Upload rendered scoreboard
        uses: actions/upload-artifact@v4
        with:
          name: scoreboard
          path: docs/SCOREBOARD.md

      - name: Commit scoreboard (nightly only)
        if: github.event_name == 'schedule' && github.ref == 'refs/heads/main'
        run: |
          git config user.name "wafrift-bot"
          git config user.email "wafrift-bot@users.noreply.github.com"
          if git diff --quiet docs/SCOREBOARD.md; then
            echo "scoreboard unchanged — no commit"
            exit 0
          fi
          git add docs/SCOREBOARD.md
          git commit -m "scoreboard: nightly refresh $(date -u +%Y-%m-%d)"
          git push origin HEAD:main
