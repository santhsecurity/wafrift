name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  msrv:
    name: MSRV
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.88
      - uses: Swatinem/rust-cache@v2
      # `--all-features` pulls `tls-impersonate` → rquest → boring-sys,
      # which compiles a forked BoringSSL from C. ubuntu-latest ships
      # clang/gcc/cmake/golang; `ninja-build` is the only missing tool
      # (same as the dedicated `tls-impersonate` job). Without it
      # `cargo check --workspace --all-features` fails building
      # boring-sys — the actual cause of this job's prior red, not a
      # code/MSRV regression.
      - name: Install boring-sys C build deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ninja-build
      - run: cargo check --workspace --all-features

  ci:
    name: CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - name: vendored rules in sync with workspace
        run: |
          # Each publishable crate vendors a copy of the workspace
          # rule files it `include_str!`s. If the workspace copy
          # diverges (someone updated rules/ but forgot the vendored
          # mirror), the published crate will ship stale data. Fail
          # CI fast so the drift gets caught at PR time.
          set -e
          diff -q rules/cmd/payloads.toml crates/grammar/rules/cmd/payloads.toml
          diff -q rules/sql/operators.toml crates/grammar/rules/sql/operators.toml
          diff -q rules/templates.toml crates/grammar/rules/templates.toml
          diff -q rules/cmd/oracle.toml crates/oracle/rules/cmd/oracle.toml
          diff -q rules/ssrf/indicators.toml crates/oracle/rules/ssrf/indicators.toml
          diff -q rules/path_traversal/sequences.toml crates/oracle/rules/path_traversal/sequences.toml
          diff -q rules/waf_presets.toml crates/strategy/rules/waf_presets.toml
          diff -rq rules/detect crates/detect/rules/detect
      - run: cargo fmt --all --check
      # `--all-features` is intentionally NOT used here because
      # `tls-impersonate` pulls in rquest -> boring-sys (C build).
      # That feature is exercised by the dedicated `tls-impersonate`
      # job below, which installs the required C toolchain. Keeping
      # the default lane fast + portable.
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo build --workspace
      # Fast per-push gate: the wafrift-wafmodel property + scale suites
      # run with a *reduced* case/config count so the push gate stays
      # quick. The IDENTICAL properties run at full 10k/1000 in the
      # parallel `legendary` job below, which also gates — coverage is
      # not reduced, only split into a fast lane + a thorough lane.
      - name: test (fast gate — scaled property/scale suites)
        run: cargo test --workspace
        env:
          WAFMODEL_PROPTEST_CASES: "256"
          WAFMODEL_SCALE_CONFIGS: "60"
      - name: bench corpus integrity
        run: cargo run --release -p wafrift-cli -- bench-waf --validate-only --corpus wafrift-bench/corpus
      - name: bench corpus pinned hash matches wafrift-bench/CORPUS.SHA256
        run: |
          # Recompute the hash and assert it matches the pinned value.
          # This stops anyone from quietly editing corpus TOML files
          # while keeping the published bypass-rate numbers — those
          # numbers depend on this exact corpus.
          set -euo pipefail
          actual=$(find wafrift-bench/corpus -type f -name '*.toml' | sort | xargs sha256sum | sha256sum | awk '{print $1}')
          pinned=$(grep -vE '^\s*(#|$)' wafrift-bench/CORPUS.SHA256 | head -1 | awk '{print $1}')
          if [ "$actual" != "$pinned" ]; then
            echo "::error::Corpus hash drift!"
            echo "  pinned: $pinned"
            echo "  actual: $actual"
            echo "  Update wafrift-bench/CORPUS.SHA256 + re-run any published bench results in the same commit."
            exit 1
          fi
          echo "Corpus pinned hash OK ($actual)"
      - run: cargo doc --workspace --no-deps
        env:
          RUSTDOCFLAGS: -D warnings

  audit:
    name: cargo audit
    runs-on: ubuntu-latest
    # Best-effort: surface RustSec advisories on the dep graph without
    # gating PR merges. Three advisories live in transitive deps we cannot
    # patch from here:
    #   - RUSTSEC-2023-0071 (`rsa` Marvin timing sidechannel) — pulled by
    #     `interactsh` for its OOB-server crypto; no fixed `rsa` release
    #     exists. (We did drop the *dead* direct `rsa` dep from wafrift-cli,
    #     but interactsh still requires it, so the advisory stays.)
    #   - RUSTSEC-2026-0118 (`hickory-proto` NSEC3 loop) — no upstream fix.
    #   - RUSTSEC-2026-0119 (`hickory-proto` O(n²) name compression) — fix
    #     needs a `reqwest`->hickory 0.26 bump that only lands when upstream
    #     republishes; `hickory` is pulled transitively via `reqwest`.
    # A strict gate would block all PRs until upstream cuts fixes, so the
    # job stays non-gating and the advisories remain VISIBLE (we do not
    # `--ignore` them) so each upstream fix-window is tracked. The fixable
    # advisory IS fixed at the source: wasmtime bumped 30->36.0.x clears
    # RUSTSEC-2026-0088/0089 (we use cranelift + no pooling, so neither was
    # exploitable, but the upgrade removes them durably). Pinned to 36.0.x
    # (patched >=36.0.7) to keep MSRV at rustc 1.86 — wasmtime >=42 needs
    # rustc 1.91+ / 45 needs 1.93, which would break the 1.88 MSRV gate.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: cargo-audit
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - name: Run cargo audit
        run: cargo audit

  docker:
    name: Docker image smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build container image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: wafrift-ci-smoke:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Smoke test — wafrift --help
        run: docker run --rm wafrift-ci-smoke:latest wafrift --help
      - name: Smoke test — wafrift evade
        run: docker run --rm wafrift-ci-smoke:latest wafrift evade --payload "' OR 1=1--" --level light
      - name: Smoke test — wafrift-proxy --help
        run: docker run --rm wafrift-ci-smoke:latest wafrift-proxy --help
      - name: Smoke test — wafrift man emits troff
        run: |
          # Stage 1: emit, capture stdout, expect troff macros + non-empty.
          out=$(docker run --rm wafrift-ci-smoke:latest wafrift man)
          test -n "$out"
          echo "$out" | grep -q '\.SH NAME'
          echo "$out" | grep -q 'wafrift'

  tls-impersonate:
    name: TLS impersonation feature (rquest + BoringSSL)
    runs-on: ubuntu-latest
    # Optional/best-effort: don't gate PRs on this. boring-sys C build
    # is brittle across runner image churn; the default `ci` job already
    # builds + tests the whole workspace without this feature, so a
    # green default lane proves the practitioner's no-feature path is
    # solid even if this lane is red.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: tls-impersonate
      - name: Install boring-sys C build deps
        run: |
          # rquest >= 5 (used behind the `tls-impersonate` feature)
          # links a forked BoringSSL via boring-sys, which compiles
          # from C. Required tools per BoringSSL's build.md:
          #   - cmake (configure step)
          #   - clang or gcc (compile)
          #   - golang (asm helper)
          #   - ninja-build (faster than make)
          # ubuntu-latest already ships clang/gcc/cmake/golang;
          # ninja-build is the only one we have to apt-install.
          sudo apt-get update -qq
          sudo apt-get install -y -qq ninja-build
      - run: cargo build -p wafrift-transport --features tls-impersonate
      - run: "cargo test  -p wafrift-transport stealth:: --features tls-impersonate"
      - run: cargo build -p wafrift-proxy --features tls-impersonate
      - run: cargo test  -p wafrift-proxy   --features tls-impersonate

  legendary:
    name: legendary (full wafmodel matrix — 10k props / 1000 configs)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # The IDENTICAL property + scale suites the fast `ci` lane runs
      # scaled-down, here at full strength (10k proptest cases, 1000
      # deterministic configs). Runs in PARALLEL with `ci`, so it does
      # not lengthen the fast push gate; it is the always-on thorough
      # lane and it GATES (no continue-on-error). --release: the heavy
      # numeric/learning loops dominate, so release runtime ≪ debug.
      - run: cargo test -p wafrift-wafmodel --release

  mutants:
    name: mutants (E5 — anti-rig core mine.rs + sfa.rs + solve.rs; 0 missed)
    runs-on: ubuntu-latest
    # Hard wall-clock cap: a mis-scoped or runtime-blown job must fail
    # FAST, never burn the runner for 85 min then die at exit 143.
    # mine+sfa was ~27 min on the slow runner; +solve.rs (24 mutants,
    # ~1 min local) leaves comfortable headroom under 50.
    timeout-minutes: 50
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-mutants
      # Mutation testing is the ground truth that the suite is not
      # decoration. Scoped to the *baselined & hardened* anti-rig core
      # (mine.rs + sfa.rs); the scope ratchets to more engine files as
      # each is baselined in subsequent slices — we never claim a file
      # is mutation-gated before it provably is. The handful of
      # provably-equivalent mutants are excluded WITH written
      # justifications in mutants.toml (item 40); `--config` is passed
      # EXPLICITLY because cargo-mutants only auto-reads
      # `.cargo/mutants.toml`, never `./mutants.toml`. The gate fails on
      # any surviving (MISSED) mutant. TIMEOUT mutants (arithmetic
      # corruptions that infinite-loop the KMP build) are a real
      # detection signal — a hung test fails CI — so they are
      # acceptable; only silent survivors are not.
      #
      # Robustness (this gate was a false-green once: cargo-mutants'
      # ANSI colour made `grep '^MISSED'` anchor on an ESC byte and the
      # gate could never fire — fixed): force `CARGO_TERM_COLOR=never`
      # AND assert the machine summary line reports exactly "0 missed".
      - name: cargo-mutants on the anti-rig core (mine.rs + sfa.rs)
        env:
          WAFMODEL_PROPTEST_CASES: "24"
          WAFMODEL_SCALE_CONFIGS: "8"
          CARGO_TERM_COLOR: "never"
        # GitHub's default `run:` shell is `bash -e -o pipefail`, which
        # ABORTS the script on the FIRST non-matching grep inside a
        # command-substitution — that false-RED'd a genuinely clean run
        # (0 missed but the summary omits the "missed" token, so the
        # extraction grep matched nothing → set -e killed the step).
        # Override to drop `-e`; keep `-u`/pipefail; extract with
        # `sed -n` which never errors on no-match.
        shell: bash --noprofile --norc {0}
        run: |
          set -uo pipefail
          # cargo-mutants owns the `mutants.out/` dir; tee elsewhere.
          # `--timeout 30`: hard per-mutant cap (the slower CI runner's
          # auto-timeout was 180s ⇒ ~30 timeout-mutants blew the job
          # budget). `--jobs 3`: parallelise across the runner's cores.
          # A hung mutant is still DETECTED (TIMEOUT, not MISSED) — just
          # in 30s instead of 180s.
          cargo mutants --config mutants.toml \
            --manifest-path crates/wafmodel/Cargo.toml --no-shuffle \
            --timeout 30 --jobs 3 \
            -f crates/wafmodel/src/mine.rs -f crates/wafmodel/src/sfa.rs \
            -f crates/wafmodel/src/solve.rs \
            -- --test mine_contract --test mine_solve_props \
               --test scale_corpus --test sfa_algebra --test artifact_contract \
               --test solve_contract --test equiv_bridge_contract --test cve_replay \
            2>&1 | tee mutants_run.log || true
          # Belt: no MISSED line at all (colour stripped ⇒ real anchor).
          if grep -qE '^MISSED' mutants_run.log; then
            echo "::error::surviving (MISSED) mutant in the anti-rig core"
            grep -E '^MISSED' mutants_run.log
            exit 1
          fi
          # Suspenders: the machine summary must exist and must not
          # report any missed mutant. cargo-mutants OMITS the "N missed"
          # token entirely when it is zero, so: no summary line at all
          # ⇒ the run itself broke (fail); summary present without a
          # "missed" token ⇒ genuinely 0 (pass); "N missed" with N>0 ⇒
          # fail.
          summary="$(grep -E '[0-9]+ mutants tested' mutants_run.log | tail -1)"
          if [ -z "$summary" ]; then
            echo "::error::no cargo-mutants summary — the run did not complete"
            exit 1
          fi
          echo "summary: $summary"
          # cargo-mutants omits the "N missed" token entirely when it is
          # zero. `sed -n` prints the count iff the token is present and
          # exits 0 regardless (no failing pipeline under pipefail);
          # absent ⇒ empty ⇒ 0.
          missed="$(printf '%s\n' "$summary" | sed -nE 's/.*[^0-9]([0-9]+) missed.*/\1/p')"
          missed="${missed:-0}"
          if [ "$missed" != "0" ]; then
            echo "::error::cargo-mutants reports ${missed} missed mutant(s)"
            exit 1
          fi
          echo "0 missed — every non-equivalent mutant in mine.rs + sfa.rs + solve.rs is detected"
