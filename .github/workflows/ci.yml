name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  msrv:
    name: MSRV
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.88
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --workspace --all-features

  ci:
    name: CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - name: vendored rules in sync with workspace
        run: |
          # Each publishable crate vendors a copy of the workspace
          # rule files it `include_str!`s. If the workspace copy
          # diverges (someone updated rules/ but forgot the vendored
          # mirror), the published crate will ship stale data. Fail
          # CI fast so the drift gets caught at PR time.
          set -e
          diff -q rules/cmd/payloads.toml crates/grammar/rules/cmd/payloads.toml
          diff -q rules/sql/operators.toml crates/grammar/rules/sql/operators.toml
          diff -q rules/templates.toml crates/grammar/rules/templates.toml
          diff -q rules/cmd/oracle.toml crates/oracle/rules/cmd/oracle.toml
          diff -q rules/ssrf/indicators.toml crates/oracle/rules/ssrf/indicators.toml
          diff -q rules/path_traversal/sequences.toml crates/oracle/rules/path_traversal/sequences.toml
          diff -q rules/waf_presets.toml crates/strategy/rules/waf_presets.toml
          diff -rq rules/detect crates/detect/rules/detect
      - run: cargo fmt --all --check
      - run: cargo clippy --workspace --all-features --all-targets -- -D warnings
      - run: cargo build --workspace --all-features
      - run: cargo test --workspace --all-features
      - name: bench corpus integrity
        run: cargo run --release -p wafrift-cli -- bench-waf --validate-only --corpus wafrift-bench/corpus
      - name: bench corpus pinned hash matches wafrift-bench/CORPUS.SHA256
        run: |
          # Recompute the hash and assert it matches the pinned value.
          # This stops anyone from quietly editing corpus TOML files
          # while keeping the published bypass-rate numbers — those
          # numbers depend on this exact corpus.
          set -euo pipefail
          actual=$(find wafrift-bench/corpus -type f -name '*.toml' | sort | xargs sha256sum | sha256sum | awk '{print $1}')
          pinned=$(grep -vE '^\s*(#|$)' wafrift-bench/CORPUS.SHA256 | head -1 | awk '{print $1}')
          if [ "$actual" != "$pinned" ]; then
            echo "::error::Corpus hash drift!"
            echo "  pinned: $pinned"
            echo "  actual: $actual"
            echo "  Update wafrift-bench/CORPUS.SHA256 + re-run any published bench results in the same commit."
            exit 1
          fi
          echo "Corpus pinned hash OK ($actual)"
      - run: cargo doc --workspace --no-deps
        env:
          RUSTDOCFLAGS: -D warnings

  docker:
    name: Docker image smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build container image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: wafrift-ci-smoke:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Smoke test — wafrift --help
        run: docker run --rm wafrift-ci-smoke:latest wafrift --help
      - name: Smoke test — wafrift evade
        run: docker run --rm wafrift-ci-smoke:latest wafrift evade --payload "' OR 1=1--" --level light
      - name: Smoke test — wafrift-proxy --help
        run: docker run --rm wafrift-ci-smoke:latest wafrift-proxy --help
      - name: Smoke test — wafrift man emits troff
        run: |
          # Stage 1: emit, capture stdout, expect troff macros + non-empty.
          out=$(docker run --rm wafrift-ci-smoke:latest wafrift man)
          test -n "$out"
          echo "$out" | grep -q '\.SH NAME'
          echo "$out" | grep -q 'wafrift'
