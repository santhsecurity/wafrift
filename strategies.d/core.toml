# WAFRift Core Tamper Strategies Configuration
# 
# This file defines the built-in tamper strategies available for WAF evasion.
# Strategies are applied in order of aggressiveness (least to most aggressive).
# 
# To customize: copy this file and modify the 'enabled' flags or add context hints.

[[strategies]]
name = "case_alternation"
enabled = true
contexts = ["sql", "xss", "cmd"]
description = "Alternating upper/lower case to bypass case-sensitive filters"

[[strategies]]
name = "url_encode"
enabled = true
contexts = ["sql", "xss", "cmd", "ldap", "ssrf"]
description = "Standard URL encoding (%XX)"

[[strategies]]
name = "whitespace_insertion"
enabled = true
contexts = ["sql"]
description = "Insert tabs into SQL keywords to break regex matching"

[[strategies]]
name = "sql_comment"
enabled = true
contexts = ["sql"]
description = "Insert SQL comments into keywords (SEL/**/ECT)"

[[strategies]]
name = "html_entity"
enabled = true
contexts = ["xss", "html"]
description = "HTML entity encoding (&#xXX;)"

[[strategies]]
name = "unicode_escape"
enabled = true
contexts = ["xss", "json"]
description = "Unicode escape sequences (\\uXXXX)"

[[strategies]]
name = "double_url_encode"
enabled = true
contexts = ["sql", "xss", "cmd", "ldap", "ssrf"]
description = "Double URL encoding (%25XX) - bypasses single-decode WAFs"

[[strategies]]
name = "null_byte"
enabled = true
contexts = ["file_upload", "path_traversal"]
description = "Null byte injection (%00) - truncates strings in some parsers"

[[strategies]]
name = "base64"
enabled = true
contexts = ["sql", "xss", "cmd"]
description = "Base64 encoding"

[[strategies]]
name = "overlong_utf8"
enabled = true
contexts = ["path_traversal", "ssrf"]
description = "Overlong UTF-8 encoding - bypasses UTF-8 validation"

[[strategies]]
name = "hex_encode"
enabled = true
contexts = ["sql", "xss"]
description = "Hexadecimal encoding"
