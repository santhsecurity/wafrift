[[gap]]
crate = "fingerprint"
src_loc = 927
tests_dir_loc = 0
inline_tests = 27
severity = "high"
why = """
fingerprint exposes the WAF-detection rules adapted from wafw00f.
Inline tests verify rule parsing. There is NO corpus test that
walks a vendored set of real WAF response signatures through the
detector and asserts the right WAF is named. Without this, a regex
typo in any of the 70+ wafw00f-derived rules silently skips the WAF.
"""
needed = [
    "tests/wafw00f_corpus.rs — vendored signature corpus (one file per WAF), assert detect() names the WAF",
    "tests/attribution_chain.rs — assert citation back to wafw00f survives detection (regression for stripped attribution)",
    "tests/false_positive_corpus.rs — non-WAF responses (plain nginx/apache/cloudfront), assert zero detections",
    "tests/cross_signature_priority.rs — overlapping signatures (CF + Akamai both match), assert deterministic priority",
]

