[meta]
date = "2026-05-10"
methodology = """
For each workspace crate: source LoC, integration test LoC, inline
test count. Crates with high src and zero/low tests/ are gaps.
Crates with adversarial test coverage but no negative-twin / property
/ cross-file tests are partial gaps.
"""

# ── CRITICAL gaps: high src, zero or near-zero integration tests ─────

[[gap]]
crate = "smuggling"
src_loc = 2868
tests_dir_loc = 0
inline_tests = 89
severity = "critical"
why = """
The smuggling crate is the engine for HTTP request smuggling
(CL.0 / CL.TE / TE.TE / TE.CL / chunked-edge). Inline tests cover
encoder roundtrips but there's no integration coverage proving the
encoded payloads land as smuggled requests at a real upstream. A
regression here is silent — the proxy keeps working, the WAF
keeps blocking, but the smuggling vector that was supposed to bypass
is just no-op'd.
"""
needed = [
    "tests/cl_0_smuggling.rs — assert chunked body with CL=0 reaches upstream as two requests",
    "tests/cl_te_smuggling.rs — CL+TE conflict, prove front-end uses CL while back-end uses TE",
    "tests/te_te_smuggling.rs — duplicate TE headers with one obfuscated",
    "tests/chunked_edge.rs — 0-size chunks, trailing CRLF games, chunk-extension abuse",
    "tests/property_smuggling.rs — proptest 10k cases: any payload + smuggling encoding round-trips at the wire",
]

[[gap]]
crate = "proxy"
src_loc = 9719
tests_dir_loc = 19
inline_tests = 208
severity = "critical"
why = """
9.7K LoC of proxy code with 19 LoC of integration tests. Inline
tests are unit-level (auth header parsing, cert generation). The
end-to-end path (client → MITM → evade → upstream → MITM → client)
has no test that walks the full pipeline through the real binary.
Every regression in the forward path is invisible until production.
"""
needed = [
    "tests/forward_path_e2e.rs — real proxy binary, mock upstream (axum), assert evasion applied + response unchanged",
    "tests/mitm_cert_chain.rs — generated CA + per-host leaf, openssl s_client verifies chain",
    "tests/intercept_rendezvous.rs — INTERCEPT_MODE drains queue on toggle-off, no leaks",
    "tests/mutate_url_pipeline.rs — --mutate-url end-to-end: GET /search?q=1' OR '1 → upstream sees percent-encoded",
    "tests/captchaforge_install.rs — --captchaforge succeeds with feature on, errors with feature off",
    "tests/challenge_replay.rs — Cloudflare clearance cookie captured + reattached on next req to same host",
]

