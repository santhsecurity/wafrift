[meta]
date = "2026-05-19"
methodology = """
For each workspace crate: source LoC, integration test LoC, inline
test count. Crates with high src and zero/low tests/ are gaps.
Crates with adversarial test coverage but no negative-twin / property
/ cross-file tests are partial gaps.

Each [[gap]] and [[robustness]] entry carries status = "done" | "open".
"""

# ── CRITICAL gaps: high src, zero or near-zero integration tests ─────

[[gap]]
crate = "smuggling"
status = "done"
src_loc = 2868
tests_dir_loc = 0
inline_tests = 89
severity = "critical"
why = """
The smuggling crate is the engine for HTTP request smuggling
(CL.0 / CL.TE / TE.TE / TE.CL / chunked-edge). Inline tests cover
encoder roundtrips but there's no integration coverage proving the
encoded payloads land as smuggled requests at a real upstream. A
regression here is silent — the proxy keeps working, the WAF
keeps blocking, but the smuggling vector that was supposed to bypass
is just no-op'd.
"""
needed = [
    { file = "tests/cl_0_smuggling.rs", status = "done" },
    { file = "tests/cl_te_smuggling.rs", status = "done" },
    { file = "tests/te_te_smuggling.rs", status = "done" },
    { file = "tests/chunked_edge.rs", status = "done" },
    { file = "tests/property_smuggling.rs", status = "done" },
    { file = "tests/h2_desync_integration.rs", status = "done" },
]

