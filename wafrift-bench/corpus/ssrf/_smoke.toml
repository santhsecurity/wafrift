schema = 1

[[case]]
id = "aws_metadata"
class = "ssrf"
payload = "http://169.254.169.254/latest/meta-data/"

[[case]]
id = "gcp_metadata"
class = "ssrf"
payload = "http://metadata.google.internal/computeMetadata/v1/"

[[case]]
id = "azure_metadata"
class = "ssrf"
payload = "http://169.254.169.254/metadata/instance?api-version=2021-02-01"

[[case]]
id = "localhost_redis"
class = "ssrf"
payload = "http://127.0.0.1:6379/"

[[case]]
id = "file_uri"
class = "ssrf"
payload = "file:///etc/passwd"

[[case]]
id = "gopher_smtp"
class = "ssrf"
payload = "gopher://127.0.0.1:25/_HELO%20attacker"

[[case]]
id = "decimal_localhost"
class = "ssrf"
payload = "http://2130706433/"

[[case]]
id = "ipv6_localhost"
class = "ssrf"
payload = "http://[::1]/"

[[case]]
id = "url_at_bypass"
class = "ssrf"
payload = "http://expected.com@127.0.0.1/"

[[case]]
id = "dns_rebinding_pin"
class = "ssrf"
payload = "http://make-dns-rebinding-real.example/"
