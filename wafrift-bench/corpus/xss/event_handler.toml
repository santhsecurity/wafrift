schema = 1
# Event-handler-based XSS — known attack surface for HTML5 events.

[[case]]
id = "img_onerror"
class = "xss"
payload = "<img src=x onerror=alert(1)>"

[[case]]
id = "img_onerror_template"
class = "xss"
payload = "<img src=x onerror=alert`1`>"

