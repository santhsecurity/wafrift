schema = 1

[[case]]
id = "linux_etc_passwd"
class = "path"
payload = "../../../../etc/passwd"

[[case]]
id = "linux_double_dot"
class = "path"
payload = "....//....//....//etc/passwd"

[[case]]
id = "url_encoded"
class = "path"
payload = "..%2f..%2f..%2fetc%2fpasswd"

[[case]]
id = "double_url_encoded"
class = "path"
payload = "..%252f..%252f..%252fetc%252fpasswd"

[[case]]
id = "windows_boot_ini"
class = "path"
payload = "..\\..\\..\\..\\boot.ini"

[[case]]
id = "null_byte_truncation"
class = "path"
payload = "../../etc/passwd%00"
