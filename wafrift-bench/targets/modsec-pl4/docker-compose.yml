services:
  wafrift-pl4:
    image: owasp/modsecurity-crs:4-apache-202604040104
    container_name: wafrift-pl4
    environment:
      PARANOIA: "4"
      ANOMALY_INBOUND: "5"
      ANOMALY_OUTBOUND: "4"
      BLOCKING_PARANOIA: "4"
      DETECTION_PARANOIA: "4"
      EXECUTING_PARANOIA: "4"
      SERVER_NAME: "wafrift-bench"
      BACKEND: "http://backend:80"
    ports:
      - "18084:8080"
    depends_on:
      - backend
    networks:
      - wafrift-pl4
  backend:
    image: kennethreitz/httpbin
    networks:
      - wafrift-pl4
networks:
  wafrift-pl4:
