# Core Naxsi rules — vendor this from naxsi-rules upstream when published.
# For now, a minimal subset that catches the canonical SQLi / XSS shapes.

MainRule "rx:select|union|insert|delete|update|drop|create|truncate" "msg:sql keyword" "mz:BODY|ARGS|URL" "s:$SQL:8" id:1000;
MainRule "rx:--|/\*|\*/|;\s*$" "msg:sql comment" "mz:BODY|ARGS|URL" "s:$SQL:8" id:1001;
MainRule "rx:'\s*or\s+1\s*=\s*1" "msg:classic tautology" "mz:BODY|ARGS|URL" "s:$SQL:8" id:1002;
MainRule "rx:<script|onerror|onload|javascript:" "msg:xss" "mz:BODY|ARGS|URL|HEADERS" "s:$XSS:8" id:1100;
MainRule "rx:\.\./|\.\.\\\\" "msg:path traversal" "mz:BODY|ARGS|URL" "s:$TRAVERSAL:4" id:1200;
MainRule "rx:%00|\\x00" "msg:null byte evasion" "mz:BODY|ARGS|URL" "s:$EVADE:4" id:1300;
