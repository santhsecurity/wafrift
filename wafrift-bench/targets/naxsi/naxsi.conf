# Naxsi runtime config for the wafrift bench. Production-grade defaults
# (LearningMode OFF — every triggered rule is enforced as a block).
SecRulesEnabled;
DeniedUrl "/RequestDenied";

# Score thresholds — once a request crosses any of these, naxsi calls
# DeniedUrl which we route to a 403. Bench depends on a clear block
# signal, so bias to "block early".
CheckRule "$SQL >= 4" BLOCK;
CheckRule "$RFI >= 4" BLOCK;
CheckRule "$TRAVERSAL >= 3" BLOCK;
CheckRule "$EVADE >= 3" BLOCK;
CheckRule "$XSS >= 4" BLOCK;
