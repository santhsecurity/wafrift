# Naxsi is a positive-security WAF for nginx. Rules and scoring are
# different in spirit from CRS: requests get a "score" per rule that
# fires; scores above LearningMode threshold get blocked.
services:
  wafrift-naxsi:
    image: wallarm/naxsi:1.6
    container_name: wafrift-naxsi
    ports:
      - "18086:80"
    volumes:
      - ./naxsi.conf:/etc/nginx/naxsi.rules:ro
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
    networks:
      - wafrift-naxsi
  backend:
    image: kennethreitz/httpbin
    networks:
      - wafrift-naxsi
networks:
  wafrift-naxsi:
