# Naxsi: positive-security-model WAF, only available built-from-source
# (no public docker image). Build is ~5 min cold, sub-second warm.
services:
  wafrift-naxsi:
    build:
      context: .
      dockerfile: Dockerfile
    image: wafrift/naxsi:latest
    container_name: wafrift-naxsi
    ports:
      - "18087:8080"
    depends_on:
      - backend
    networks:
      - wafrift-naxsi
  backend:
    image: kennethreitz/httpbin
    networks:
      - wafrift-naxsi
networks:
  wafrift-naxsi:
