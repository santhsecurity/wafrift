user nobody;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';
    access_log /var/log/nginx/access.log main;

    sendfile on;
    keepalive_timeout 65;

    # Naxsi rule set — core rules ship with naxsi source.
    include /etc/nginx/naxsi_rules/*.rules;

    upstream backend {
        server backend:80;
    }

    server {
        listen 8080;
        server_name _;

        location / {
            include /etc/nginx/naxsi.conf;
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Naxsi denial routing — we want a 403 (clear block signal) not
        # a runtime crash when naxsi flags a request.
        location /RequestDenied {
            return 403;
        }
    }
}
